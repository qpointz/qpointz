# Optional extras metadata seed: value-mapping facets for Moneta test columns (WI-185).
# Load after platform-bootstrap.yaml and moneta-canonical.yaml (MERGE adds facets to existing attribute entities).
# Requires FacetTypeDefinition for urn:mill/metadata/facet-type:ai-column-value-mapping (WI-181).
---
kind: MetadataEntity
entityUrn: urn:mill/model/attribute:moneta.clients.country
entityKind: attribute
facets:
  - facetTypeUrn: urn:mill/metadata/facet-type:ai-column-value-mapping
    scopeUrn: urn:mill/metadata/scope:global
    mergeAction: SET
    payload:
      context: Client country name as stored in the row; map NL country phrases to this value.
      similarityThreshold: 0.85
      nullValues:
        indexNull: false
      data:
        enabled: true
        refreshAtStartUp: true
