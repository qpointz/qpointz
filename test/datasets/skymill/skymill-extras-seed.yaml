# Optional extras metadata seed: value-mapping facets for Skymill test columns (WI-185).
# Load after platform-bootstrap.yaml and skymill-meta-seed-canonical.yaml.
# Requires FacetTypeDefinition for urn:mill/metadata/facet-type:ai-column-value-mapping (WI-181).
# `data.refreshAtStartUp: true` is required for APP_STARTUP refresh (ValueMappingRefreshOrchestrator).
---
kind: MetadataEntity
entityUrn: urn:mill/model/attribute:skymill.cities.state
entityKind: attribute
facets:
  - facetTypeUrn: urn:mill/metadata/facet-type:ai-column-value-mapping
    scopeUrn: urn:mill/metadata/scope:global
    mergeAction: SET
    payload:
      context: US state or region label for the airport city (natural-language queries vs stored value).
      similarityThreshold: 0.85
      nullValues:
        indexNull: false
      data:
        enabled: true
        refreshAtStartUp: true
