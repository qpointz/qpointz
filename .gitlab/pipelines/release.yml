    APP_EDITION: "samples"
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/base/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME: mill-service-${APP_EDITION}
    DOCKER_BUILD_ARGS: --build-arg APP_EDITION=${APP_EDITION}

clients:jdbc-shell-dist:
  extends: .clients-jdbc-shell-package-dist-template
  stage: build
  variables:
    CLIENTS_PROJECT_VERSION: ${QP_VERSION_PEP440}

clients:jdbc-shell-docker:
  stage: package
  extends: .docker-build-job-release
  needs:
    - job: publish:require-version
      artifacts: true
    - job: clients:jdbc-shell-dist
      artifacts: true
  variables:
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/clients/mill-jdbc-shell
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/clients/mill-jdbc-shell/src/main/docker/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME: jdbc-shell


maven-publish:
  stage: publish
  script:
    - export SONATYPE_TOKEN=Authorization:\ Bearer\ $(echo -n $SONATYPE_USERNAME:$SONATYPE_PASSWORD | base64)
    - export SONATYPE_PUBLISHING_TYPE="USER_MANAGED"
    - |
      if [ "main" = "${CI_COMMIT_REF_SLUG}" ]
      then
        export SONATYPE_PUBLISHING_TYPE="AUTOMATIC"
      fi
    - export SONATYPE_URL="https://central.sonatype.com/api/v1/publisher/upload?publishingType=${SONATYPE_PUBLISHING_TYPE}&name=mill-${QP_VERSION_PEP440}-$(date +%Y%m%d_%H%M%S)"
    - echo $SONATYPE_URL
    - curl --fail --show-error --silent -X POST --header "$SONATYPE_TOKEN" --form bundle=@${CI_PROJECT_DIR}/build/sonatype-bundle/sonatype-bundle.zip $SONATYPE_URL
  needs:
    - job: maven-publication-create
      artifacts: true
  rules:
    - when: manual

publish:pypi-test:
  stage: publish
  variables:
    TEST_TYPE: "unit"
    PY_VER: "3.13"
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/python:${PY_VER}-slim
  needs:
    - job: publish:require-version
      artifacts: true
  script:
    - cd ${CI_PROJECT_DIR}/clients/mill-py
    - |
      pip install poetry
      poetry install --all-extras
    - poetry version "${QP_VERSION_PEP440}"
    - poetry build
    - poetry config repositories.testpypi https://test.pypi.org/legacy/
    - poetry config pypi-token.testpypi $PYPI_API_TOKEN_TEST
    - poetry publish --repository testpypi
    - |
      pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ qpointz-mill-py
      python -c "from mill import connect; print('OK')"
  rules:
    - when: manual

publish:pypi-prod:
  stage: publish
  variables:
    TEST_TYPE: "unit"
    PY_VER: "3.13"
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/python:${PY_VER}-slim
  needs:
    - job: publish:require-version
      artifacts: true
  script:
    - cd ${CI_PROJECT_DIR}/clients/mill-py
    - |
      pip install poetry
      poetry install --all-extras
    - poetry version "${QP_VERSION_PEP440}"
    - poetry build
    - poetry config pypi-token.pypi $PYPI_API_TOKEN
    - poetry publish
    - |
      pip install qpointz-mill-py 
      python -c "from mill import connect; print('OK')"
  rules:
    - when: manual

publish:docs:
  extends: .node-job
  stage: publish
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:24-alpine
  needs:
    - job: publish:require-version
      artifacts: true
  variables:
    GIT_STRATEGY: clone
    SITE_DOCS_REPO: "https://gitlab.qpointz.io/qpointz/site-documentation.git"
    SITE_DOCS_BRANCH: "main"
    DOCS_SOURCE_DIR: "${CI_PROJECT_DIR}/docs/public/src"
    SITE_DOCS_WORKDIR: "/tmp/site-documentation"
    GIT_COMMITTER_NAME: docs-bot
    GIT_COMMITTER_EMAIL: docs-bot@qpointz.io
  script:
    - |
      apk add --no-cache git rsync
      test -n "${CI_PUSH_TOKEN}" || (echo "CI_PUSH_TOKEN is required" && exit 1)
      test -d "${DOCS_SOURCE_DIR}" || (echo "Missing docs source: ${DOCS_SOURCE_DIR}" && exit 1)
      export DOCS_VERSION="${CI_COMMIT_TAG#v}"
      echo "Publishing docs version ${DOCS_VERSION} to site-documentation"
      rm -rf "${SITE_DOCS_WORKDIR}"
      git clone --depth 1 --branch "${SITE_DOCS_BRANCH}" "https://oauth2:${CI_PUSH_TOKEN}@${SITE_DOCS_REPO#https://}" "${SITE_DOCS_WORKDIR}"
      rm -rf "${SITE_DOCS_WORKDIR}/docs"
      mkdir -p "${SITE_DOCS_WORKDIR}/docs"
      rsync -a --delete "${DOCS_SOURCE_DIR}/" "${SITE_DOCS_WORKDIR}/docs/"
      printf '%s\n' "${DOCS_VERSION}" > "${SITE_DOCS_WORKDIR}/DOCS_VERSION"
      cd "${SITE_DOCS_WORKDIR}"
      git config user.name "${GIT_COMMITTER_NAME}"
      git config user.email "${GIT_COMMITTER_EMAIL}"
      git add docs DOCS_VERSION
    - |
      if git diff --cached --quiet; then
        echo "No site-documentation changes detected."
      else
        git commit -m "docs: release ${DOCS_VERSION} from ${CI_PROJECT_PATH}@${CI_COMMIT_TAG}"
        git push origin "${SITE_DOCS_BRANCH}"
      fi
  rules:
    - when: manual