apps:minimal-edition-dist:
  extends: .apps-package-dist-template
  stage: build
  # needs:
  #   - job: publish:require-version
  #     artifacts: true
  #   - job: ui:ui-v1:build
  #     artifacts: true
  #   - job: ui:ui-v2:build
  #     artifacts: true
  variables:
    APPS_PROJECT_VERSION: ${QP_VERSION_PEP440}
    APP_EDITION: "minimal"
  artifacts:
    expire_in: "1 days"
    paths:
      - ${CI_PROJECT_DIR}/apps/mill-service/build/install/**/*
      - ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/samples/data/**/*      

apps:minimal-edition-docker:
  stage: package
  extends: .docker-build-job-release
  needs:
    - job: publish:require-version
      artifacts: true
    - job: apps:minimal-edition-dist
      artifacts: true
  variables:
    APP_EDITION: "minimal"
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/base/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME: mill-service-${APP_EDITION}
    DOCKER_BUILD_ARGS: --build-arg APP_EDITION=${APP_EDITION}


