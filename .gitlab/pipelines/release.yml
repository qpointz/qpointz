include:
  - local: /.gitlab/common/common.yml
  - local: /.gitlab/pipelines/packaging.yml

workflow:
  rules:
    - when: always

stages:
  - init
  - build
  - package
  - publish

publish:require-version:
  stage: init
  script:
    - |
      if [ -z "${CI_COMMIT_TAG}" ]; then
        echo "ERROR: CI_COMMIT_TAG is required for release pipeline."
        exit 1
      fi

      export QP_VERSION="${CI_COMMIT_TAG}"
      VERSION_NO_PREFIX="${QP_VERSION#v}"
      BASE_VERSION="$(printf '%s' "${VERSION_NO_PREFIX}" | sed -nE 's/^([0-9]+\.[0-9]+\.[0-9]+)(-.+)?$/\1/p')"
      if [ -z "${BASE_VERSION}" ]; then
        echo "ERROR: Unsupported release tag format: ${QP_VERSION}"
        echo "Expected: vX.Y.Z, vX.Y.Z-rc, vX.Y.Z-rc.N, or vX.Y.Z-dev.N"
        exit 1
      fi

      if printf '%s' "${VERSION_NO_PREFIX}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
        QP_VERSION_PEP440="${BASE_VERSION}"
      else
        RC_NUMBER="$(printf '%s' "${VERSION_NO_PREFIX}" | sed -nE 's/^[0-9]+\.[0-9]+\.[0-9]+-rc\.?([0-9]+)$/\1/p')"
        RC_NO_NUMBER="$(printf '%s' "${VERSION_NO_PREFIX}" | sed -nE 's/^[0-9]+\.[0-9]+\.[0-9]+-rc$/rc/p')"
        DEV_NUMBER="$(printf '%s' "${VERSION_NO_PREFIX}" | sed -nE 's/^[0-9]+\.[0-9]+\.[0-9]+-dev\.([0-9]+)$/\1/p')"

        if [ -n "${RC_NUMBER}" ]; then
          QP_VERSION_PEP440="${BASE_VERSION}rc${RC_NUMBER}"
        elif [ "${RC_NO_NUMBER}" = "rc" ]; then
          QP_VERSION_PEP440="${BASE_VERSION}rc0"
        elif [ -n "${DEV_NUMBER}" ]; then
          QP_VERSION_PEP440="${BASE_VERSION}.dev${DEV_NUMBER}"
        else
          echo "ERROR: Unsupported release tag suffix: ${QP_VERSION}"
          echo "Expected: vX.Y.Z, vX.Y.Z-rc, vX.Y.Z-rc.N, or vX.Y.Z-dev.N"
          exit 1
        fi
      fi

      echo "Using QP_VERSION=${QP_VERSION}"
      echo "Using QP_VERSION_PEP440=${QP_VERSION_PEP440}"
      echo "QP_VERSION_PEP440=${QP_VERSION_PEP440}" > publish-version.env
  artifacts:
    reports:
      dotenv: publish-version.env

maven-publication-create:
  extends: .gradle-job
  stage: build
  before_script:
    - echo -n "${SIGN_PGP_RING}" | base64 --decode > ${CI_PROJECT_DIR}/.keyring.kbx
  script:
    - ./gradlew --no-daemon --continue  --console plain clean publish publishSonatypeBundle -PprojectVersion=${QP_VERSION_PEP440} -Psigning.keyId=${SIGN_PGP_KEY_ID} -Psigning.password=${SIGN_PGP_PASS} -Psigning.secretKeyRingFile=${CI_PROJECT_DIR}/.keyring.kbx
  needs:
    - job: publish:require-version
      artifacts: false
  artifacts:
    expire_in: "5 days"
    paths:
      - ${CI_PROJECT_DIR}/build/repo/**/*
      - ${CI_PROJECT_DIR}/build/sonatype-bundle/**/*
      - ${CI_PROJECT_DIR}/build/sonatype-bundle/*

ui:ui-v1:build:
  extends: .node-job
  stage: build
  needs:
    - job: publish:require-version
      artifacts: false
  script:
    - cd ${CI_PROJECT_DIR}/ui/mill-grinder-ui
    - npm install    
    - npm run build
  artifacts:
    expire_in: "2 days"
    paths:
      - ${CI_PROJECT_DIR}/ui/mill-grinder-service/src/main/resources/static/app/v1

ui:ui-v2:build:
  extends: .node-job
  stage: build
  needs:
    - job: publish:require-version
      artifacts: false
  script:
    - cd ${CI_PROJECT_DIR}/ui/mill-ui
    - npm install    
    - npm run build
  artifacts:
    expire_in: "2 days"
    paths:
      - ${CI_PROJECT_DIR}/ui/mill-grinder-service/src/main/resources/static/app/v2

apps:package-dist:
  extends: .gradle-job
  stage: build
  needs:
    - job: ui:ui-v1:build
      artifacts: true
    - job: ui:ui-v2:build
      artifacts: true
  script:
    - |
      if [ -n "${QP_VERSION}" ]; then
        echo "${QP_VERSION}" > ${CI_PROJECT_DIR}/VERSION
      fi
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain :apps:mill-service:installBootDist :apps:mill-service:assembleSamples
  artifacts:
    expire_in: "5 days"
    paths:
      - ${CI_PROJECT_DIR}/apps/mill-service/build/install/**/*
      - ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/samples/data/**/*      

apps:mill-service-base-docker:
  stage: package
  extends: .docker-build-job
  needs:
    - job: apps:package-dist
      artifacts: true
  variables:
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/base/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME : mill-service
    DOCKER_LOCAL_ONLY: $PACKAGE_LOCAL_ONLY

apps:mill-service-samples-docker:
  stage: package
  extends: .docker-build-job
  needs:
    - job: apps:mill-service-base-docker
      artifacts: false
    - job: apps:package-dist
      artifacts: true
  variables:
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/samples/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME : mill-service-samples
    DOCKER_LOCAL_ONLY: $PACKAGE_LOCAL_ONLY
    DOCKER_BUILD_ARGS: --build-arg BASE_IMAGE=${CI_REGISTRY_IMAGE}/mill-service:${CI_COMMIT_REF_SLUG}


