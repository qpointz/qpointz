include:
  - local: /.gitlab/common/common.yml

workflow:
  rules:
    - when: always

stages:
  - build

components:test:
  stage: build
  extends: .gradle-job
  script:
    - cd ${CI_PROJECT_DIR}
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain test compileTestIT
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - ${CI_PROJECT_DIR}/**/build/reports/tests/test/      
    reports:
      junit:
        - ${CI_PROJECT_DIR}/**/build/test-results/test/TEST-*.xml        

ui:v1:test:
  extends: .node-job
  stage: build
  script:
    - cd ${CI_PROJECT_DIR}/ui/mill-grinder-ui
    - npm install
    - npm run test:run
    - npm run build
  artifacts:
    expire_in: "5 days"
    paths:
      - ${CI_PROJECT_DIR}/ui/mill-grinder-service/src/main/resources/static/app/v1
    reports:
      junit:
        - ui/**/.test/*.xml

ui:v2:test:
  extends: .node-job
  stage: build
  script:
    - cd ${CI_PROJECT_DIR}/ui/mill-ui
    - npm install
    - npm run test:ci
    - npm run build
  artifacts:
    expire_in: "5 days"
    paths:
      - ${CI_PROJECT_DIR}/ui/mill-grinder-service/src/main/resources/static/app/v2
    reports:
      junit:
        - ui/**/.test/*.xml

mill-py-3.12:test:
  extends: .python-mill-py-unit-test
  variables:
    TEST_TYPE: "unit"
    PY_VER: "3.12"

mill-py-3.13:test:
  extends: .python-mill-py-unit-test
  variables:
    TEST_TYPE: "unit"
    PY_VER: "3.13"

mill-py-3.14:test:
  extends: .python-mill-py-unit-test
  variables:
    TEST_TYPE: "unit"
    PY_VER: "3.14"
