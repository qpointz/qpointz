include:
  - local: /.gitlab/common/common.yml

workflow:
  rules:
    - when: always

stages:
  - package
  - integration

package:dev-certs:
  stage: package
  extends: .init-dev-certs

apps:package-dist:
  extends: .gradle-job
  stage: package
  needs:
    - job: package:dev-certs
      artifacts: true
  script:
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain :apps:mill-service:installBootDist :apps:mill-service:assembleSamples
  artifacts:
    expire_in: "1 days"
    paths:
      - ${CI_PROJECT_DIR}/apps/mill-service/build/install/**/*
      - ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/samples/data/**/*

apps:mill-service-base-docker:
  stage: package
  extends: .docker-build-job
  needs:
    - job: apps:package-dist
      artifacts: true
  variables:
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/base/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME: mill-service
    DOCKER_LOCAL_ONLY: "true"

apps:mill-service-samples-docker:
  stage: package
  extends: .docker-build-job
  needs:
    - job: apps:mill-service-base-docker
      artifacts: false
    - job: apps:package-dist
      artifacts: true
  variables:
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/samples/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME: mill-service-samples
    DOCKER_LOCAL_ONLY: "true"
    DOCKER_BUILD_ARGS: --build-arg BASE_IMAGE=${CI_REGISTRY_IMAGE}/mill-service:${CI_COMMIT_REF_SLUG}

core:integration:
  stage: integration
  extends:
    - .gradle-job  
  script:
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain :core:testIT


ai:integration:
  stage: integration
  extends:
    - .gradle-job    
  allow_failure: true
  script:
    - !reference [ .global-vars, before_script ]
    - export REGRESSION_VERSION_TAG=${QP_VERSION}
    - echo "REGRESSION_VERSION_TAG=${REGRESSION_VERSION_TAG}"
    - ./gradlew --no-daemon --continue --console plain :ai:testIT
  artifacts:
    when: always
    expire_in: "5 days"
    paths:
      - ${CI_PROJECT_DIR}/ai/mill-ai-v1-core/build/reports/scenarios/*.json

