include:
  - local: /.gitlab/common/common.yml
  - local: /.gitlab/templates/apps-package-dist.yml

workflow:
  rules:
    - when: always

stages:
  - package
  - integration

package:dev-certs:
  stage: package
  extends: .init-dev-certs

apps:integration-edition-package:
  extends: .apps-package-dist-template
  variables:
    APP_EDITION: "integration"
  needs:
    - job: package:dev-certs
      artifacts: true

apps:integration-edition-docker:
  stage: package
  extends: .docker-build-job
  needs:
    - job: apps:integration-edition-package
      artifacts: true
  variables:
    APP_EDITION: "integration"
    DOCKER_BUILD_CTX: ${CI_PROJECT_DIR}/apps/mill-service
    DOCKER_BUILD_FILE: ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/base/Dockerfile
    DOCKER_BUILD_CONTAINER_NAME: mill-service-${APP_EDITION}
    DOCKER_BUILD_ARGS: --build-arg APP_EDITION=${APP_EDITION}

core:integration:
  stage: integration
  extends:
    - .gradle-job  
  script:
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain :core:testIT


# Disabled: v1 NL2SQL scenario regression (`:ai:legacy:*` testIT). Re-enable against v3 when
# integration is reimplemented — see docs-design/design/ai/ai-v1-integration/README.md
ai:integration:
  stage: integration
  extends:
    - .gradle-job
  rules:
    - when: never
  script:
    - echo "ai:integration is disabled; see docs-design/design/ai/ai-v1-integration/README.md"

cloud:integration:
  stage: integration
  extends:
    - .gradle-job
  script:
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain :cloud:testIT

