.mill-py-integration-template:  
  stage: integration
  extends:
    - .python-job
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/python:${PY_VER}-slim
  allow_failure: true
  variables:
    CI_DEBUG_SERVICES: "false"
    # Runtime
    PY_VER: "3.12"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PIP_ROOT_USER_ACTION: "ignore"
    # Integration connection configuration consumed by tests/integration/conftest.py
    MILL_IT_HOST: "mill-it"
    MILL_IT_PORT: "9090"
    MILL_IT_PROTOCOL: "grpc"         # grpc | http-json | http-protobuf
    MILL_IT_BASE_PATH: "/services/jet"
    MILL_IT_TLS: "false"
    MILL_IT_TLS_CA: ""
    MILL_IT_TLS_CERT: ""
    MILL_IT_TLS_KEY: ""
    MILL_IT_AUTH: "none"             # none | basic | bearer
    MILL_IT_USERNAME: "reader"
    MILL_IT_PASSWORD: "reader"
    MILL_IT_TOKEN: ""
    MILL_IT_SCHEMA: "skymill"
    # Platform REST (/api/v1/metadata, /api/v1/schema) — same mill-it container, HTTP port
    MILL_IT_PLATFORM_ORIGIN: "http://mill-it:8080"
    # Optional custom pytest selector
    MILL_IT_PYTEST_PATH: "tests/integration/"
  services:
    - name: ${CI_REGISTRY_IMAGE}/mill-service-integration:${CI_COMMIT_REF_SLUG}
      alias: mill-it
      command: [""]
      entrypoint: ["./bin/mill-service"]
      pull_policy: [always]
  script:
    - cd ${CI_PROJECT_DIR}/clients/mill-py
    - echo "Waiting 30s for integration service startup..."
    - sleep 30
    - |
      echo "Integration params:"
      echo "  MILL_IT_PROTOCOL=${MILL_IT_PROTOCOL}"
      echo "  MILL_IT_HOST=${MILL_IT_HOST}"
      echo "  MILL_IT_PORT=${MILL_IT_PORT}"
      echo "  MILL_IT_BASE_PATH=${MILL_IT_BASE_PATH}"
      echo "  MILL_IT_AUTH=${MILL_IT_AUTH}"
      echo "  MILL_IT_TLS=${MILL_IT_TLS}"
      echo "  MILL_IT_SCHEMA=${MILL_IT_SCHEMA}"
      echo "  MILL_IT_PLATFORM_ORIGIN=${MILL_IT_PLATFORM_ORIGIN}"
    - |
      CURL_AUTH=""
      if [ "${MILL_IT_AUTH}" = "basic" ]; then
        CURL_AUTH="-u ${MILL_IT_USERNAME}:${MILL_IT_PASSWORD}"
      fi
      if [ "${MILL_IT_PROTOCOL}" = "http-json" ] || [ "${MILL_IT_PROTOCOL}" = "http-protobuf" ] || [ "${MILL_IT_PROTOCOL}" = "http" ]; then
        echo "HTTP route diagnostics (non-fatal):"
        curl -i ${CURL_AUTH} -X POST "http://${MILL_IT_HOST}:${MILL_IT_PORT}${MILL_IT_BASE_PATH}/Handshake" \
          -H "Content-Type: application/json" \
          -d '{}' || true
        curl -i ${CURL_AUTH} -X POST "http://${MILL_IT_HOST}:${MILL_IT_PORT}/api/Handshake" \
          -H "Content-Type: application/json" \
          -d '{}' || true
      fi
    - python --version
    - pip install poetry
    - poetry install --all-extras
    - |
      poetry run pytest \
        -s \
        -m integration \
        --junitxml=build/test-results/integration-results.xml \
        ${MILL_IT_PYTEST_PATH}
  artifacts:
    when: always
    expire_in: "5 days"
    reports:
      junit: ${CI_PROJECT_DIR}/clients/mill-py/build/test-results/*.xml
    paths:
      - ${CI_PROJECT_DIR}/clients/mill-py/build/test-results/*.xml

# File-backed basic auth (external etc/auth/auth.yml in image: admin / admin).
.mill-py-integration-auth-template:
  extends: .mill-py-integration-template
  variables:
    MILL_IT_AUTH: "basic"
    MILL_IT_USERNAME: "admin"
    MILL_IT_PASSWORD: "admin"
  services:
    - name: ${CI_REGISTRY_IMAGE}/mill-service-integration:${CI_COMMIT_REF_SLUG}
      alias: mill-it
      command: ["--spring.profiles.active=skymill,secure-file"]
      entrypoint: ["./bin/mill-service"]
      pull_policy: [always]


