.init-dev-certs:
  stage: init
  image: "${IMAGE_MINICA}"
  script:         
    - mkdir -p ${CI_PROJECT_DIR}/etc/
    - cp -R /certs ${CI_PROJECT_DIR}/etc/
    - ls -lart ${CI_PROJECT_DIR}/etc/
  artifacts:    
    when: always
    expire_in: "1 days"
    paths:
      - ${CI_PROJECT_DIR}/etc/certs/**/*
