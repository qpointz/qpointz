.docker-base:
    image:
        name: docker:27-cli
        entrypoint: [""]
    variables:
      DOCKER_BUILDKIT: "1"
      DOCKER_DRIVER: overlay2
    before_script:
      - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"

.docker-build-job:
    extends: .docker-base
    script:
      - export DOCKER_TAG_ARGS="--tag ${CI_REGISTRY_IMAGE}/${DOCKER_BUILD_CONTAINER_NAME}:${CI_COMMIT_REF_SLUG}"
      - echo "DOCKER_TAG_ARGS:${DOCKER_TAG_ARGS}"
      - export DOCKER_BUILD_ARGS=" ${DOCKER_BUILD_ARGS} "
      - export DOCKER_CACHE_REF="${CI_REGISTRY_IMAGE}/cache/${DOCKER_BUILD_CONTAINER_NAME}:${CI_COMMIT_REF_SLUG}"
      - export DOCKER_BUILDER_NAME="ci-builder-${CI_JOB_ID}"
      - docker buildx create --name "${DOCKER_BUILDER_NAME}" --driver docker-container --use
      - docker buildx inspect --bootstrap
      - >
        docker buildx build
        --file "${DOCKER_BUILD_FILE}"
        --cache-from "type=registry,ref=${DOCKER_CACHE_REF}"
        --cache-to "type=registry,ref=${DOCKER_CACHE_REF},mode=max"
        ${DOCKER_TAG_ARGS}
        ${DOCKER_BUILD_ARGS}
        --push
        "${DOCKER_BUILD_CTX}"
    after_script:
      - docker buildx rm "ci-builder-${CI_JOB_ID}" || true

.docker-build-job-release:
    extends: .docker-base
    script:
      - |
        if [ -z "${DOCKER_HUB_USER}" ] || [ -z "${DOCKER_HUB_PASSWORD}" ]; then
          echo "ERROR: DOCKER_HUB_USER and DOCKER_HUB_PASSWORD are required for release docker publishing."
          exit 1
        fi
      - docker login -u "${DOCKER_HUB_USER}" -p "${DOCKER_HUB_PASSWORD}" docker.io
      - |
        if [ -z "${QP_VERSION_PEP440}" ]; then
          echo "ERROR: QP_VERSION_PEP440 is required for release docker publishing."
          exit 1
        fi
      - >
        export DOCKER_TAG_ARGS="--tag ${CI_REGISTRY_IMAGE}/${DOCKER_BUILD_CONTAINER_NAME}:${CI_COMMIT_REF_SLUG}
        --tag ${CI_REGISTRY_IMAGE}/${DOCKER_BUILD_CONTAINER_NAME}:${QP_VERSION_PEP440}
        --tag qpointz/${DOCKER_BUILD_CONTAINER_NAME}:${QP_VERSION_PEP440}"
      - echo "DOCKER_TAG_ARGS:${DOCKER_TAG_ARGS}"
      - export DOCKER_BUILD_ARGS=" ${DOCKER_BUILD_ARGS} "
      - export DOCKER_CACHE_REF="${CI_REGISTRY_IMAGE}/cache/${DOCKER_BUILD_CONTAINER_NAME}:${CI_COMMIT_REF_SLUG}"
      - export DOCKER_BUILDER_NAME="ci-builder-${CI_JOB_ID}"
      - docker buildx create --name "${DOCKER_BUILDER_NAME}" --driver docker-container --use
      - docker buildx inspect --bootstrap
      - >
        docker buildx build
        --file "${DOCKER_BUILD_FILE}"
        --cache-from "type=registry,ref=${DOCKER_CACHE_REF}"
        --cache-to "type=registry,ref=${DOCKER_CACHE_REF},mode=max"
        ${DOCKER_TAG_ARGS}
        ${DOCKER_BUILD_ARGS}
        --push
        "${DOCKER_BUILD_CTX}"
    after_script:
      - docker buildx rm "ci-builder-${CI_JOB_ID}" || true
