.apps-package-dist-template:
  extends: .gradle-job
  stage: package
  variables:
    APP_EDITION: "basic"
    APPS_PROJECT_VERSION: ""
  script:
    - |
      APPS_PROJECT_VERSION_ARG=""
      if [ -n "${APPS_PROJECT_VERSION}" ]; then
        APPS_PROJECT_VERSION_ARG=" -PprojectVersion=${APPS_PROJECT_VERSION}"
      fi
      CLEAN_TASK=""
      if [ "$GRADLE_DO_CLEAN" = "true" ] || [ "$GRADLE_FORCE_CLEAN" = "true" ]; then
        CLEAN_TASK="clean"
      fi
      ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain ${CLEAN_TASK} :apps:mill-service:installBootDist -Pedition=${APP_EDITION}${APPS_PROJECT_VERSION_ARG}
    - |
      set -euo pipefail
      INSTALL_DIR="${CI_PROJECT_DIR}/apps/mill-service/build/install/mill-service-boot-${APP_EDITION}"
      MODULES_DIR="${CI_PROJECT_DIR}/apps/mill-service/build/jlink-modules/${APP_EDITION}"
      JDEPS_DIR="${CI_PROJECT_DIR}/apps/mill-service/build/jdeps/${APP_EDITION}"

      mkdir -p "${MODULES_DIR}" "${JDEPS_DIR}"

      FAT_JAR=""
      for candidate in "${INSTALL_DIR}"/lib/mill-service-*.jar; do
        if [ -f "${candidate}" ] && [ "${candidate#*-plain.jar}" = "${candidate}" ]; then
          FAT_JAR="${candidate}"
          break
        fi
      done

      if [ -z "${FAT_JAR}" ]; then
        echo "Could not locate fat jar in ${INSTALL_DIR}/lib"
        exit 1
      fi

      cd "${JDEPS_DIR}"
      jar xf "${FAT_JAR}" BOOT-INF/classes BOOT-INF/lib

      "$JAVA_HOME/bin/jdeps" \
        --multi-release 25 \
        --ignore-missing-deps \
        --recursive \
        --print-module-deps \
        --class-path "${JDEPS_DIR}/BOOT-INF/lib/*" \
        "${JDEPS_DIR}/BOOT-INF/classes" 2>/dev/null \
        | { grep -E '^[a-z]' || true; } > "${MODULES_DIR}/jdeps-modules.csv"

      if [ ! -s "${MODULES_DIR}/jdeps-modules.csv" ]; then
        echo "ERROR: jdeps produced no module dependencies for ${APP_EDITION}"
        exit 1
      fi

      # jdeps does not see JMX remote, -javaagent, or ACA Java Development Stack needs; append for jlink images.
      RUNTIME_MODULES="jdk.crypto.ec,jdk.crypto.cryptoki,java.naming,jdk.naming.dns,java.sql,java.management,jdk.management.agent,java.instrument"
      echo "$(cat "${MODULES_DIR}/jdeps-modules.csv"),${RUNTIME_MODULES}" > "${MODULES_DIR}/jdeps-modules.csv"

      tr ',' '\n' < "${MODULES_DIR}/jdeps-modules.csv" | sed '/^$/d' | sort -u > "${MODULES_DIR}/jdeps-modules.txt"
      "$JAVA_HOME/bin/java" --list-modules | cut -d@ -f1 | sort -u > "${MODULES_DIR}/jdk-modules.txt"
      comm -12 "${MODULES_DIR}/jdeps-modules.txt" "${MODULES_DIR}/jdk-modules.txt" | paste -sd, - > "${MODULES_DIR}/jlink-modules.txt"
  artifacts:
    expire_in: "1 days"
    paths:
      - ${CI_PROJECT_DIR}/apps/mill-service/build/install/**/*
      - ${CI_PROJECT_DIR}/apps/mill-service/build/jlink-modules/${APP_EDITION}/*
      - ${CI_PROJECT_DIR}/apps/mill-service/src/main/docker/samples/data/**/*
