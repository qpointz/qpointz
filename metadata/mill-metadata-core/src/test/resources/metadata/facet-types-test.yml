facet-types:
  - typeKey: urn:mill/metadata/facet-type:descriptive
    mandatory: true
    enabled: true
    displayName: Descriptive
    description: Human-readable metadata
    applicableTo:
      - urn:mill/metadata/entity-type:schema
      - urn:mill/metadata/entity-type:table
      - urn:mill/metadata/entity-type:attribute
    version: "1.0"

  - typeKey: custom-audit
    mandatory: false
    enabled: true
    displayName: Custom Audit Trail
    description: Tracks compliance audit status per entity
    applicableTo:
      - urn:mill/metadata/entity-type:table
    version: "1.0"
    contentSchema:
      type: object
      properties:
        lastAuditDate:
          type: string
        auditor:
          type: string
        status:
          type: string
          enum:
            - passed
            - failed
            - pending
      required:
        - lastAuditDate
        - status
