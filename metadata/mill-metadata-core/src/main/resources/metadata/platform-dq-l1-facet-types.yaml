---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-referential-target
title: Referential Integrity (Target)
description: Documents an inbound foreign-key rule where the assigned table is the target (parent) side. The host table is the facet assignment target; the child table is in source. Optional source.columns and targetColumns pair for equi-join; optional joinSql when column lists are omitted or insufficient. Passes when no inbound references point to missing rows on the host.
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Referential integrity rule (target)
  description: Common DQ envelope plus child source reference, optional host target columns, and optional joinSql (same join semantics as dq-referential-integrity).
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. inbound_customer_refs).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: source
    schema:
      type: OBJECT
      title: Source
      description: Child table and FK columns that reference the host table.
      fields:
      - name: schema
        schema:
          type: STRING
          title: Schema
          description: Schema name of the child (source) table.
        required: true
      - name: table
        schema:
          type: STRING
          title: Table
          description: Table name of the child (source) table.
        required: true
      - name: columns
        schema:
          type: ARRAY
          title: Source columns
          description: FK column(s) on the child table. Optional when joinSql supplies the join predicate.
          items:
            type: STRING
            title: Source column
            description: One source column name.
        required: false
      required: []
    required: true
  - name: targetColumns
    schema:
      type: ARRAY
      title: Target columns
      description: Key column(s) on the assigned (host) table. Optional when joinSql supplies the join predicate.
      items:
        type: STRING
        title: Target column
        description: One target column name on the host table.
    required: false
  - name: joinSql
    schema:
      type: STRING
      title: Join SQL
      description: Optional SQL-like join expression between source (child) and the host (target) table (e.g. s.customer_id = t.id). Same semantics as dq-referential-integrity; use when column lists are omitted or insufficient.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when orphan inbound references are found.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:table
schemaVersion: '1.0'
