# Platform data-quality facet types (L1). Loaded after platform-bootstrap.yaml (and platform-flow-facet-types.yaml when present).
# Design: docs/design/metadata/dq-rule-facet-types.md (WI-342).
---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-null-check
title: Null Check
description: 'Documents a completeness rule on the assigned column: no row may have a NULL value in that column. Assign on an attribute entity; the host column is resolved from the facet assignment target, not from structural column metadata. At execution time the rule passes when the violation count is zero.'
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Null check rule
  description: Operator label, severity, and optional tags for a NOT NULL constraint on the assigned column.
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label for this rule instance (e.g. customer_id_not_null). Used in reports and execution logs.
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Narrative intent, business context, or remediation notes for this rule instance.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when the rule fails at execution time.
      values:
      - value: info
        description: Informational finding; does not block downstream processing by default.
      - value: warning
        description: Potential data quality issue worth review before publishing.
      - value: error
        description: Definite violation; default when unset. Use for rules that must pass before release.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form labels on this instance (e.g. pii, regulatory, nightly).
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:attribute
schemaVersion: '1.0'
---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-empty-value-check
title: Empty Value Check
description: 'Documents a completeness rule on the assigned string column: values must not be empty or whitespace-only after optional trimming. Assign on an attribute entity; the host column comes from the facet assignment target. Passes when no violating rows remain (typically TRIM(column) = '''' while column IS NOT NULL).'
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Empty value check rule
  description: Common DQ envelope plus optional trim behavior for blank-string detection.
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label for this rule instance (e.g. name_not_blank).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Narrative intent, business context, or remediation notes.
    required: false
  - name: trimWhitespace
    schema:
      type: BOOLEAN
      title: Trim whitespace
      description: When true (default), treat whitespace-only strings as empty via TRIM before comparison. When false, only the literal empty string '' violates the rule.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when the rule fails.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review before publishing.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:attribute
schemaVersion: '1.0'
