kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-data-age-check
title: Data Age Check
description: 'Documents a freshness rule on the assigned table: the latest timestamp in a nominated column must be within maxAge of the evaluation anchor. Without expectedScheduleCron the anchor is now (MAX(timestampColumn) >= now() - maxAge). With expectedScheduleCron the anchor is the most recent schedule tick at or before evaluation time in expectedScheduleTimezone (platform local timezone when omitted); pass when MAX(timestampColumn) WHERE timestampColumn < anchor >= anchor - maxAge. Assign on a table entity.'
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Data age check rule
  description: Common DQ envelope plus timestamp column, maximum allowed age, and optional expected-arrival schedule with timezone.
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. orders_fresh_within_24h).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: timestampColumn
    schema:
      type: STRING
      title: Timestamp column
      description: Column on the host table holding last-update or ingest time (e.g. updated_at, loaded_at).
    required: true
  - name: maxAge
    schema:
      type: STRING
      title: Maximum age
      description: ISO-8601 duration (e.g. PT24H, P1D). Stale when the relevant latest timestamp is older than the evaluation anchor minus this value. Anchor is now() when expectedScheduleCron is omitted, or the most recent schedule tick when it is set.
    required: true
  - name: expectedScheduleCron
    schema:
      type: STRING
      title: Expected schedule (cron)
      description: Optional cron when data is expected (Spring 6-field or Unix 5-field). Use for non-daily feeds (e.g. 0 0 6 * * MON-FRI for weekdays at 06:00). Execution picks the latest tick at or before evaluation time as the anchor; freshness uses MAX(timestampColumn) among rows strictly before that anchor. Cron fields are interpreted in expectedScheduleTimezone (platform local timezone when omitted).
    required: false
  - name: expectedScheduleTimezone
    schema:
      type: STRING
      title: Expected schedule timezone
      description: Optional IANA timezone ID for expectedScheduleCron tick resolution (e.g. Europe/Amsterdam, America/New_York). When omitted, the platform local timezone is used.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when data is stale.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:table
schemaVersion: '1.0'
---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-referential-integrity
title: Referential Integrity (Full)
description: Documents a foreign-key rule between a source and target table defined entirely in the payload. Assign on a schema entity. source.columns and target.columns are optional; provide paired lists for equi-join or joinSql for a custom join expression (same semantics on source/target facet variants). Passes when no orphan outbound references exist.
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Referential integrity rule (full)
  description: Common DQ envelope plus source and target table references (same object shapes as relation facet).
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. orders_customer_fk).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: source
    schema:
      type: OBJECT
      title: Source
      description: Child / outbound table and optional FK columns.
      fields:
      - name: schema
        schema:
          type: STRING
          title: Schema
          description: Schema name of the source (child) table.
        required: true
      - name: table
        schema:
          type: STRING
          title: Table
          description: Table name of the source (child) table.
        required: true
      - name: columns
        schema:
          type: ARRAY
          title: Source columns
          description: FK column(s) on the source table. Optional when joinSql supplies the join predicate.
          items:
            type: STRING
            title: Source column
            description: One source column name.
        required: false
      required: []
    required: true
  - name: target
    schema:
      type: OBJECT
      title: Target
      description: Parent / referenced table and optional key columns.
      fields:
      - name: schema
        schema:
          type: STRING
          title: Schema
          description: Schema name of the target (parent) table.
        required: true
      - name: table
        schema:
          type: STRING
          title: Table
          description: Table name of the target (parent) table.
        required: true
      - name: columns
        schema:
          type: ARRAY
          title: Target columns
          description: Referenced key column(s) on the target table. Optional when joinSql supplies the join predicate.
          items:
            type: STRING
            title: Target column
            description: One target column name.
        required: false
      required: []
    required: true
  - name: joinSql
    schema:
      type: STRING
      title: Join SQL
      description: Optional SQL-like join expression between source and target (e.g. s.customer_id = t.id). Use when column lists are omitted or insufficient. When both paired column lists and joinSql are present, joinSql takes precedence at compile time.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when orphan FK rows are found.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:schema
schemaVersion: '1.0'
---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-referential-source
title: Referential Integrity (Source)
description: Documents an outbound foreign-key rule where the assigned table is the source (child) side. The host table is the facet assignment target; the referenced parent is in target. Optional sourceColumns and target.columns pair for equi-join; optional joinSql when column lists are omitted or insufficient. Passes when no orphan outbound references exist.
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Referential integrity rule (source)
  description: Common DQ envelope plus optional host source columns, target reference, and optional joinSql (same join semantics as dq-referential-integrity).
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. outbound_customer_fk).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: sourceColumns
    schema:
      type: ARRAY
      title: Source columns
      description: FK column(s) on the assigned (host) table. Optional when joinSql supplies the join predicate.
      items:
        type: STRING
        title: Source column
        description: One source column name on the host table.
    required: false
  - name: target
    schema:
      type: OBJECT
      title: Target
      description: Referenced parent table and optional key columns.
      fields:
      - name: schema
        schema:
          type: STRING
          title: Schema
          description: Schema name of the target table.
        required: true
      - name: table
        schema:
          type: STRING
          title: Table
          description: Table name of the target table.
        required: true
      - name: columns
        schema:
          type: ARRAY
          title: Target columns
          description: Referenced key column(s) on the target table. Optional when joinSql supplies the join predicate.
          items:
            type: STRING
            title: Target column
            description: One target column name.
        required: false
      required: []
    required: true
  - name: joinSql
    schema:
      type: STRING
      title: Join SQL
      description: Optional SQL-like join expression between the host (source) table and target (e.g. s.customer_id = t.id). Same semantics as dq-referential-integrity; use when column lists are omitted or insufficient.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when orphan FK rows are found.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
