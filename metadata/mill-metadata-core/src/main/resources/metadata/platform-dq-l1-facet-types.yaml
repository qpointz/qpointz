kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-pattern-check
title: Pattern Check
description: 'Documents a format validity rule on the assigned column: values must match a SQL pattern (LIKE or dialect-specific regex). Assign on an attribute entity. Passes when no rows fail the pattern match (violation count is zero).'
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Pattern check rule
  description: Common DQ envelope plus pattern and optional dialect selector.
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. email_format_check).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: pattern
    schema:
      type: STRING
      title: Pattern
      description: Pattern string interpreted per patternDialect (e.g. %@%.% for sql_like email shape, or a dialect regex accepted by the execution engine).
    required: true
  - name: patternDialect
    schema:
      type: ENUM
      title: Pattern dialect
      description: Selects how pattern is interpreted at compile time against the active SQL dialect.
      default: sql_like
      values:
      - value: sql_like
        description: SQL LIKE match using % (any sequence) and _ (single character) wildcards.
      - value: sql_regex
        description: SQL regular-expression match — semantics depend on the vendor and Calcite/dialect backend (not fixed in metadata).
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when pattern violations are found.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:attribute
schemaVersion: '1.0'
