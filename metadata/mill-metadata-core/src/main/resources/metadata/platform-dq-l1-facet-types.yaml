kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:dq-min-max-check
title: Min/Max Check
description: 'Documents a range rule on the assigned column: values must fall within inclusive min and/or max bounds. Assign on an attribute entity. Use numeric strings for numbers or ISO-8601 date strings for dates. At least one of min or max is required. Passes when no rows are outside the range.'
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Min/max check rule
  description: Common DQ envelope plus inclusive lower and/or upper bounds.
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. age_in_range).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: min
    schema:
      type: STRING
      title: Minimum
      description: Inclusive lower bound as a decimal number string (e.g. 0) or ISO-8601 date (e.g. 2020-01-01). Provide at least one of min or max.
    required: false
  - name: max
    schema:
      type: STRING
      title: Maximum
      description: Inclusive upper bound as a decimal number string (e.g. 120) or ISO-8601 date. Provide at least one of min or max.
    required: false
  - name: severity
    schema:
      type: ENUM
      title: Severity
      description: Reporting severity when out-of-range values are found.
      values:
      - value: info
        description: Informational finding.
      - value: warning
        description: Worth review.
      - value: error
        description: Definite violation; default when unset.
    required: false
  - name: profile
    schema:
      type: STRING
      title: Threshold profile
      description: 'Optional violation-rate bands (percent of rows failing the rule). Two-threshold warn:error (e.g. 10:80) -> rate <=10% pass, (10,80] warning, >80% error (severity ignored). Single threshold (e.g. 10) -> rate <=10% pass, >10% reports at severity (e.g. severity warning -> warn). Omitted -> any violation uses severity.'
    required: false
  - name: enabled
    schema:
      type: BOOLEAN
      title: Enabled
      description: When false, skip execution. Schema default true; omitted payload uses default at execution (M-16). Entity facet forms do not apply boolean schema defaults.
      default: true
    required: false
  - name: tags
    schema:
      type: ARRAY
      title: Tags
      description: Free-form instance labels.
      items:
        type: STRING
        title: Tag
        description: One tag value.
    required: false
    stereotype: tags
  required: []
applicableTo:
- urn:mill/metadata/entity-type:attribute
schemaVersion: '1.0'
