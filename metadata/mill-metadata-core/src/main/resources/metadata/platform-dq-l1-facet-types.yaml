title: Allowed Values Check
description: 'Documents a validity rule on the assigned column: every value must belong to a predefined domain list. Assign on an attribute entity. Passes when no rows have values outside allowedValues (NULL handling is engine-defined; typically NULL is not in the set unless listed).'
enabled: true
category: data-quality
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Allowed values check rule
  description: Common DQ envelope plus the canonical allowed value list.
  fields:
  - name: name
    schema:
      type: STRING
      title: Rule name
      description: Short operator label (e.g. status_domain_check).
    required: true
  - name: description
    schema:
      type: STRING
      title: Description
      description: Business context or remediation notes.
    required: false
  - name: allowedValues
    schema:
      type: ARRAY
      title: Allowed values
      description: Canonical domain for the column (e.g. ACTIVE, INACTIVE). Violating rows have values not in this set.
      items:
        type: STRING
        title: Allowed value
        description: One permitted column value.
    required: true
