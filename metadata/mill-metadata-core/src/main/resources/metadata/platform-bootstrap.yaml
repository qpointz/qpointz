# Platform metadata loaded only via mill.metadata.seed.resources (global scope + standard facet types).
# Edit this file to change titles, payload schemas, or applicability — do not duplicate in Flyway SQL.
# Authoritative set: descriptive, concept, structural, relation, value-mapping (SPEC §11.0).
---
kind: MetadataScope
scopeUrn: urn:mill/metadata/scope:global
scopeType: GLOBAL
referenceId: ~
displayName: Global
ownerId: ~
visibility: PUBLIC
---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:descriptive
title: Description
description: "Provides the display name, narrative description, and tags for an entity."
enabled: true
category: general
mandatory: true
targetCardinality: SINGLE
contentSchema:
  type: OBJECT
  title: Description
  description: "Fields that hold the display name, narrative description, and tags."
  fields:
    - name: title
      schema:
        type: STRING
        title: Title
        description: "Short human-readable name shown for the entity."
      required: false
    - name: description
      schema:
        type: STRING
        title: Description
        description: "Full narrative text that describes the entity."
      required: true
    - name: tags
      schema:
        type: ARRAY
        title: Tags
        description: "List of tags attached to the entity."
        items:
          type: STRING
          title: Tag
          description: "One tag value."
      required: false
      stereotype: tags
  required: []
applicableTo: []
schemaVersion: "1.0"
