#
# Shape follows:
#   metadata/mill-metadata-core/src/main/resources/metadata/platform-bootstrap.yaml
#
# Usage: not loaded automatically. To register in Mill, add this file (or a copy) to
#   mill.metadata.seed.resources after platform-bootstrap.yaml so global scope and
#   platform facet types exist first.
