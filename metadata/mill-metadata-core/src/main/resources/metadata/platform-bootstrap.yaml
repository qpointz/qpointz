---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:relation
title: Relation
description: "Provides a relation definition with both source and target, independent of either participating table."
enabled: true
category: relation
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Relation payload
  description: "Fields that identify the source table, the target table, and the cardinality of the relation."
  fields:
    - name: source
      schema:
        type: OBJECT
        title: Source
        description: "Source table and source columns for the relation."
        fields:
          - name: schema
            schema:
              type: STRING
              title: Schema
              description: "Schema name of the source table."
            required: true
          - name: table
            schema:
              type: STRING
              title: Table
              description: "Table name of the source table."
            required: true
          - name: columns
            schema:
              type: ARRAY
              title: Source Columns
              description: "List of columns on the source table that participate in the relation."
              items:
                type: STRING
                title: Source Column
                description: "One source column name."
            required: true
        required: []
      required: true
    - name: target
      schema:
        type: OBJECT
        title: Target
        description: "Target table and target columns for the relation."
        fields:
          - name: schema
            schema:
              type: STRING
              title: Schema
              description: "Schema name of the target table."
            required: true
          - name: table
            schema:
              type: STRING
              title: Table
              description: "Table name of the target table."
            required: true
          - name: columns
            schema:
              type: ARRAY
              title: Target Columns
              description: "List of columns on the target table that participate in the relation."
              items:
                type: STRING
                title: Target Column
                description: "One target column name."
            required: true
        required: []
      required: true
    - name: cardinality
      schema:
        type: ENUM
        title: Cardinality
        description: "Cardinality of the relation from the source table to the target table."
        values:
          - value: ONE_TO_ONE
            description: "Each row in the source table relates to at most one row in the target table, and each target row relates to at most one row in the source table."
          - value: ONE_TO_MANY
            description: "One row in the source table can relate to multiple rows in the target table."
          - value: MANY_TO_MANY
            description: "Rows in the source table can relate to multiple rows in the target table, and target rows can relate to multiple rows in the source table."
          - value: UNKNOWN
            description: "The relation exists, but its cardinality is not specified."
      required: true
    - name: joinSql
      schema:
        type: STRING
        title: Join SQL
        description: "Indicative SQL-like expression that hints how records from the source table join to records in the target table."
      required: true
  required: []
applicableTo: []
schemaVersion: "1.0"
