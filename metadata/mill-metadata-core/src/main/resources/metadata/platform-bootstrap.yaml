---
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:links
title: Links
description: "Provides one or more hyperlinks for an entity (optional title per link; href required)."
enabled: true
category: general
mandatory: false
targetCardinality: MULTIPLE
contentSchema:
  type: OBJECT
  title: Links
  description: "Each facet instance is one object with a links array; the UI renders items as hyperlink rows."
  fields:
    - name: title
      schema:
        type: STRING
        title: Title
        required: true
        description: "Name of list of links."
    - name: links
      schema:
        type: ARRAY
        title: Links
        description: "Ordered list of { title?, href } objects."
        items:
          type: OBJECT
          title: Link
          description: "Single hyperlink; omit or leave title empty to use href as the visible label."
          fields:
            - name: title
              schema:
                type: STRING
                title: Title
                description: "Visible label; optional — if empty, href is shown as the link text."
              required: false
            - name: href
              schema:
                type: STRING
                title: URL
                description: "Target URL (UI may prepend https when no scheme is present)."
                format: uri
              required: true
          required: []
      required: false
      stereotype:
        - hyperlink
  required: []
applicableTo: []
schemaVersion: "1.0"
