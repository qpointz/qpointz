# Qsynth custom facet types (FacetTypeDefinition) — review / optional Mill seed.
#
# Shape follows:
#   metadata/mill-metadata-core/src/main/resources/metadata/platform-bootstrap.yaml
#
# Usage: not loaded automatically. To register in Mill, add this file (or a copy) to
#   mill.metadata.seed.resources after platform-bootstrap.yaml so global scope and
#   platform facet types exist first.
#
# URNs: urn:mill/metadata/facet-type:qsynth.*
# Category: data (synthetic / generator metadata tab)
kind: FacetTypeDefinition
facetTypeUrn: urn:mill/metadata/facet-type:qsynth-model
title: Qsynth model
description: "Provides the qsynth model settings attached to a schema entity."
enabled: true
category: data
mandatory: false
targetCardinality: SINGLE
contentSchema:
  type: OBJECT
  title: Qsynth model payload
  description: "Fields that hold the qsynth model name, schema key, locales, row multiplier, and provenance tool."
  fields:
    - name: qsynth_model_name
      schema:
        type: STRING
        title: Qsynth model name
        description: "Model name from the qsynth YAML."
      required: true
    - name: config_schema
      schema:
        type: STRING
        title: Config schema key
        description: "Schema key used for the model."
      required: true
    - name: locales
      schema:
        type: STRING
        title: Faker locales
        description: "Locale value or locale list used by qsynth."
      required: false
    - name: rows_multiply
      schema:
        type: NUMBER
        title: Rows multiply
        description: "Row multiplier applied to generated row counts."
      required: false
    - name: provenance_tool
      schema:
        type: ENUM
        title: Provenance tool
        description: "Tool name recorded for the model metadata."
        values:
          - value: QSYNTH
            description: "Metadata provided from a qsynth model."
      required: true
  required: []
applicableTo:
  - urn:mill/metadata/entity-type:schema
schemaVersion: "1.0"
