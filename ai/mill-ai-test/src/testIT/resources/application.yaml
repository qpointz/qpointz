mill:
  ai:
    providers:
      openai:
        type: openai
        api-key: ${OPENAI_API_KEY}
    models:
      embedding:
        openai-it:
          provider: openai
          model-name: text-embedding-3-small
          dimension: 1536
    data:
      embedding:
        default:
          model: openai-it
          vector-store:
            backend: in-memory
          sources:
            - type: metadata-facets
    chat:
      value-mapping:
        embedding: default
