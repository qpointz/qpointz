name: metadata
description: |
  Read-only metadata facet catalog and entity facet tools for AI v3.
  Use together with schema tools: resolve entity URNs, then list merged facets.

prompts:
  metadata.faceting.system:
    description: Grounding order for facet operations.
    content: |
      Ground schema entities first: list_schemas → list_tables (every schema when hunting a table name) →
      list_columns as needed.
      Use qualified catalog paths (`schema`, `schema.table`, `schema.table.column`) from schema tool rows.
      Never synthesize `urn:mill/model/…` strings — call `resolve_metadata_entity(catalogPath)` or copy
      `metadataEntityUrn` from schema tool output when you need the canonical URN.
      Discover categories with list_facet_categories, shortlist facet types with list_facet_types,
      read full contentSchema with get_facet_type, validate with validate_facet_payload,
      then capture with propose_facet_assignment (metadata-authoring capability).
      Facet payloads: exact catalog facetTypeKey; kebab-case `name` slugs when the schema has a name field;
      rephrase description (and similar narrative fields) for conciseness and completeness before capture.
      Use list_metadata_scopes to see which scopes are readable vs writable in this chat.

tools:
  list_facet_categories:
    description: |
      Lists facet categories with routing guidance from the metadata content store.
      Call before list_facet_types to pick the right category for the user's intent.
    output:
      type: array
      description: Category rows with optional guidance (signalPhrases, exampleFacetTypeKeys).

  list_facet_types:
    description: |
      Lists facet type summary rows from the catalog (no full contentSchema).
      Use to shortlist facetTypeKey before get_facet_type.
    input:
      type: object
      properties:
        applicableTo:
          type: string
          description: Optional entity-type URN filter.
        category:
          type: string
          description: Optional category slug (general, relation, data-quality).
        metadataEntityId:
          type: string
          description: Optional target entity URN; filters by applicableTo.
    output:
      type: array
      description: Summary facet type rows (facetTypeKey, title, category, applicableTo).

  get_facet_type:
    description: |
      Returns the full facet type manifest including contentSchema and joined examples[].
    input:
      type: object
      required:
        - facetTypeKey
      properties:
        facetTypeKey:
          type: string
          description: Facet type key or full facet type URN.
    output:
      type: object
      description: Full manifest plus optional examples[].

  list_content:
    description: |
      Lists MetadataContent rows (examples, category guidance) filtered by targetUrn and/or contentKind.
    input:
      type: object
      properties:
        targetUrn:
          type: string
          description: Facet type or category URN filter.
        contentKind:
          type: string
          description: Content kind filter (facet-type-example, facet-type-category).
    output:
      type: array

  get_content:
    description: Returns one MetadataContent row by contentUrn.
    input:
      type: object
      required:
        - contentUrn
      properties:
        contentUrn:
          type: string
    output:
      type: object

  list_metadata_scopes:
    description: |
      Returns metadata scopes available in the current AgentContext with access flags (r, w, rw).
      Chat default is global (r) and chat scope (rw).
    output:
      type: array
      description: Scope rows with scopeUrn and access.

  list_entity_facets:
    description: |
      Returns merged facet instances for one metadata entity. When scope/context is omitted, reads from all
      readable scopes on AgentContext (typically global + chat). Prefer catalogPath from schema tools.
    input:
      type: object
      properties:
        catalogPath:
          type: string
          description: Qualified database object name (`schema.table` or `schema.table.column`).
        metadataEntityId:
          type: string
          description: Deprecated alias for catalogPath or canonical entity URN.
        scope:
          type: string
          description: Optional scope query (comma-separated scope URNs).
        context:
          type: string
          description: Legacy context alias when scope is omitted.
        origin:
          type: string
          description: Optional origin filter.
    output:
      type: array
      description: Facet instance rows (maps).

  validate_facet_payload:
    description: |
      Validates a JSON payload against the facet type contentSchema and optional applicableTo for the target entity.
    input:
      type: object
      required:
        - facetTypeKey
        - payload
      properties:
        facetTypeKey:
          type: string
          description: Facet type key or full facet type URN.
        payload:
          type: object
          description: Facet JSON payload to validate.
          additionalProperties: true
        catalogPath:
          type: string
          description: Qualified database object name for applicableTo enforcement.
        metadataEntityId:
          type: string
          description: Deprecated alias for catalogPath or canonical entity URN.
    output:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
