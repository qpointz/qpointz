name: schema
description: Schema exploration capability

prompts:
  schema.intent:
    description: Classify user intent for schema structure discovery (capability-local).
    content: |
      Classify the user message for schema exploration:
      - EXPLORE — discover schemas, tables, columns, or relations without generating SQL
      - CHAT — general conversation unrelated to schema discovery
      When the user asks what tables exist, what columns a table has, or how entities relate — route to EXPLORE.

  schema.system:
    description: Guidance for schema exploration tools.
    content: |
      Use schema exploration tools to discover and describe the data platform structure.

      Schema vs table (critical):
      - list_schemas returns **database schemas** (catalog namespaces), e.g. `skymill`.
      - list_tables returns **tables inside one schema**, e.g. `passenger` in `skymill`.
      - User phrases such as "passengers", "customers", or "orders" usually mean a **table**, not a schema.
      - **Never** pass a user's entity/table word as `schemaName` to list_tables.

      Discovery order when the user asks about data or you need SQL identifiers:
      1. Call **list_schemas** when you do not know catalog schema names.
      2. Call **list_tables** for **each** `schemaName` from step 1 until you find the table
         (match `tableName` loosely: singular/plural, case-insensitive).
      3. Call **list_columns** for the chosen `schemaName` + `tableName` before generating SQL.

      Use returned names exactly as provided in subsequent tool calls.
      Each list_* row includes `catalogPath` and `metadataEntityUrn` — copy `catalogPath` into metadata tools;
      never synthesize URNs yourself.

      When `aiAnnotations` is non-empty on a list_* row, treat each entry as mandatory agent context
      before SQL (especially `kind: sql_generation`). Apply instructions unless the user's current
      message explicitly contradicts them. Do not invent annotations — only use values returned by tools.

tools:
  list_schemas:
    description: |
      Return all schemas (catalog namespaces) available in the data platform.
      Call this first when you do not yet know which schemas exist.
      **Next step:** call list_tables once per returned schemaName to find tables — user words like
      "passengers" are table names, not schema names.
      Use the returned schemaName values exactly as input to list_tables.
      An empty description means no business metadata has been provided for that schema.
    output:
      type: array
      description: All available schemas.
      items:
        type: object
        description: A single schema entry.
        properties:
          schemaName:
            type: string
            description: Exact schema name to use in subsequent tool calls.
          description:
            type: string
            description: Business description of the schema, or empty if no metadata is available.
          displayName:
            type: string
            description: Short display label from descriptive metadata, or empty if none.
          catalogPath:
            type: string
            description: Qualified schema name (same as schemaName).
          metadataEntityUrn:
            type: string
            description: Canonical metadata entity URN for this schema.
          aiAnnotations:
            type: array
            description: Enabled agent instructions on this schema entity (exact entity only; no inheritance).
            items:
              type: object
              properties:
                title:
                  type: string
                  description: Short operator label, or empty if none.
                instruction:
                  type: string
                  description: Procedural agent instruction (SQL habits, projection rules, etc.).
                kind:
                  type: string
                  description: Instruction category — sql_generation (default), tool_output, or general.
                tags:
                  type: array
                  items:
                    type: string

  list_tables:
    description: |
      Return all tables within one schema.
      Call list_schemas first if you do not know schema names.
      When locating a table mentioned by the user, call this tool **for every schema** from list_schemas
      until a matching tableName appears (treat passenger/passengers as the same intent).
      Do **not** use the user's noun as schemaName — only use schemaName values from list_schemas.
      Use the returned tableName values as input to list_columns or list_relations.
      An empty array means that schema exists but has no tables in catalog, or the schemaName was wrong.
    input:
      type: object
      description: Identifies the schema to list tables for.
      properties:
        schemaName:
          type: string
          description: Exact schema name as returned by list_schemas.
    output:
      type: array
      description: All tables within the requested schema.
      items:
        type: object
        description: A single table entry.
        properties:
          schemaName:
            type: string
            description: Schema this table belongs to.
          tableName:
            type: string
            description: Exact table name to use in subsequent tool calls.
          description:
            type: string
            description: Business description of the table, or empty if no metadata is available.
          displayName:
            type: string
            description: Short display label from descriptive metadata, or empty if none.
          catalogPath:
            type: string
            description: Qualified table name (`schema.table`).
          metadataEntityUrn:
            type: string
            description: Canonical metadata entity URN for this table.
          aiAnnotations:
            type: array
            description: Enabled agent instructions on this table entity (exact entity only; no inheritance).
            items:
              type: object
              properties:
                title:
                  type: string
                instruction:
                  type: string
                kind:
                  type: string
                tags:
                  type: array
                  items:
                    type: string

  list_columns:
    description: |
      Return all columns for a given table within a schema.
      Call list_tables first if you do not know the table name.
      Use schemaName and tableName exactly as returned by those tools.
      An empty description means no business metadata has been provided for that column.
    input:
      type: object
      description: Identifies the table to list columns for.
      properties:
        schemaName:
          type: string
          description: Exact schema name as returned by list_schemas.
        tableName:
          type: string
          description: Exact table name as returned by list_tables.
    output:
      type: array
      description: All columns within the requested table.
      items:
        type: object
        description: A single column entry.
        properties:
          schemaName:
            type: string
            description: Schema this column belongs to.
          tableName:
            type: string
            description: Table this column belongs to.
          columnName:
            type: string
            description: Exact column name.
          displayName:
            type: string
            description: Short display label from descriptive metadata, or empty if none.
          description:
            type: string
            description: Business description of the column, or empty if no metadata is available.
          nullable:
            type: string
            description: Nullability of the column (NULLABLE, NOT_NULL, or NOT_SPECIFIED_NULL).
          type:
            type: string
            description: Logical data type identifier (e.g. INTEGER, VARCHAR, TIMESTAMP).
          catalogPath:
            type: string
            description: Qualified column name (`schema.table.column`).
          metadataEntityUrn:
            type: string
            description: Canonical metadata entity URN for this column.
          aiAnnotations:
            type: array
            description: Enabled agent instructions on this column entity (exact entity only; no inheritance).
            items:
              type: object
              properties:
                title:
                  type: string
                instruction:
                  type: string
                kind:
                  type: string
                tags:
                  type: array
                  items:
                    type: string

  list_relations:
    description: |
      Return relations (foreign key / join paths) associated with a given table.
      Use direction to filter: OUTBOUND (this table is the source), INBOUND (this table is the target), BOTH (all relations).
      Call list_tables first if you do not know the table name.
    input:
      type: object
      description: Identifies the table and direction of relations to list.
      properties:
        schemaName:
          type: string
          description: Exact schema name as returned by list_schemas.
        tableName:
          type: string
          description: Exact table name as returned by list_tables.
        direction:
          type: string
          description: "Filter direction: OUTBOUND (this table is source), INBOUND (this table is target), BOTH (all)."
    output:
      type: array
      description: Relations associated with the requested table.
      items:
        type: object
        description: A single relation entry.
        properties:
          sourceSchema:
            type: string
            description: Schema of the source table.
          sourceTable:
            type: string
            description: Name of the source table.
          sourceAttributes:
            type: array
            description: Source join column names.
            items:
              type: string
              description: Column name.
          targetSchema:
            type: string
            description: Schema of the target table.
          targetTable:
            type: string
            description: Name of the target table.
          targetAttributes:
            type: array
            description: Target join column names.
            items:
              type: string
              description: Column name.
          name:
            type: string
            description: Relation name.
          description:
            type: string
            description: Business description of the relation.
          cardinality:
            type: string
            description: Relation cardinality (e.g. ONE_TO_MANY, MANY_TO_ONE, ONE_TO_ONE).
          joinSql:
            type: string
            description: Join predicate text from metadata when present, or empty if none.

  resolve_metadata_entity:
    description: |
      Resolves a qualified database object name to its canonical metadata entity URN.
      Use catalogPath from list_schemas/list_tables/list_columns, or a user-provided qualified name.
      Never synthesize URNs — always pass catalogPath and let this tool return metadataEntityUrn.
    input:
      type: object
      required:
        - catalogPath
      properties:
        catalogPath:
          type: string
          description: Qualified name (`schema`, `schema.table`, or `schema.table.column`).
    output:
      type: object
      properties:
        catalogPath:
          type: string
        metadataEntityUrn:
          type: string
        entityKind:
          type: string
        error:
          type: string
