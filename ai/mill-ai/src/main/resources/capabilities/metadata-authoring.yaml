name: metadata-authoring
description: |
  Structured facet-assignment proposals for metadata entities (CAPTURE). Terminal synthesis uses metadata.faceting.capture.

prompts:
  metadata-authoring.intent:
    description: Classify user intent for metadata facet authoring (capability-local).
    content: |
      Classify the user message for metadata authoring:
      - AUTHOR_FACET — documentary metadata (descriptions, relations, data-quality rules, constraints)
      - CHAT — general conversation unrelated to facet capture
      When the user documents metadata about schema objects, route to AUTHOR_FACET.
      Do not classify SQL/data retrieval or schema-only discovery here — sibling capabilities on the profile own those routes.

  metadata-authoring.reasoning:
    description: Catalog-driven facet authoring loop (procedure-first).
    content: |
      For facet authoring:
      1. Ground every target with schema discovery — copy each row's qualified catalogPath. Resolve canonical entity URNs via metadata tools; never invent `urn:mill/model/…` strings.
      2. Decompose the user request into a checklist of (catalogPath, facetTypeKey) pairs before any capture. Example: two columns with descriptions + NOT NULL on `id` → three captures minimum (descriptive×2 + dq-null-check×1).
      3. List writable metadata scopes for this chat.
      4. Discover facet categories from the dynamic catalog (not a hardcoded table).
      5. Shortlist facet types for the chosen category (exact catalog keys: lowercase, hyphen-separated, e.g. `descriptive`, `dq-null-check`).
      6. Load the full facet type schema and build payloads from contentSchema; follow metadata-authoring.payload-style for rule `name` slugs and narrative fields; use examples[] when present.
      7. For relations: pick relation-source vs relation-target by grounded table role in the join.
      8. Validate each planned payload against the catalog before capture.
      9. Propose one assignment per checklist row — parallel when independent; additional rounds when needed until the checklist is complete.
      10. Every inferred metadata change (descriptive, data-quality, relations, concepts, and any other catalog facet type) MUST use the facet-assignment capture path so the user can accept or reject each proposal in chat. Never substitute prose-only summaries or raw JSON for reviewable facet cards.

  metadata.faceting.lifecycle:
    description: User review lifecycle shared by all facet assignment types.
    content: |
      All LLM-reasoned metadata — descriptive, data-quality, relations, concepts, and any other catalog facet type — follows the same proposal lifecycle:
      - Emit one facet-assignment capture per (entity, facet type) pair; parallel captures when independent.
      - The user accepts or rejects each proposal in chat before it is treated as committed metadata.
      - Rejected proposals must not be applied or re-stated as facts in later turns.
      - Concept definitions on the model root use the same lifecycle; follow concept.capture for indicative SQL grounding and concept-specific payload fields.

  metadata-authoring.batch:
    description: Parallel multi-facet capture guidance.
    content: |
      When the user documents multiple columns, tables, or rules in one turn:
      - Build a capture checklist first (one row per target entity + facet type).
      - Call propose_facet_assignment in parallel for every independent row in the same tool round when possible.
      - If you cannot finish the checklist in one round, call the remaining propose_facet_assignment tools in the next round — never stop after the first column.
      - NOT NULL / must not be null on a column → data-quality category, facet type dq-null-check on that column entity (in addition to any descriptive facet).
      - On partial validation failure, persist every success; remediate failures in the next tool round — never all-or-nothing.
      Example: passenger.id (unique id, NOT NULL) + passenger.first_name (ticket name) → descriptive on id, dq-null-check on id, descriptive on first_name (three captures).

  metadata-authoring.payload-style:
    description: Facet payload naming and description quality.
    content: |
      When building facet payloads from get_facet_type contentSchema:

      **facetTypeKey** — copy the exact catalog key from list_facet_types / get_facet_type (lowercase, hyphen-separated, e.g. `descriptive`, `dq-null-check`, `relation-source`). Never invent alternate spellings or casing.

      **Rule / instance `name` fields** — when contentSchema includes a `name` property (typical for data-quality and similar multi-instance types):
      - Use a short slug: lowercase letters, digits, and hyphens only (kebab-case).
      - Derive from the target entity and rule intent, e.g. `passenger-id-not-null`, `order-shipped-before-ordered`.
      - No spaces, underscores, camelCase, or upper case.

      **Description and other narrative fields** (`description`, `title` when used as narrative, relation notes, etc.):
      - Rephrase the user's intent into one or two complete, standalone sentences.
      - Be concise but complete: state what the entity or rule is and the business meaning; keep every constraint the user stated (e.g. NOT NULL, uniqueness).
      - Do not paste vague user phrasing verbatim; do not invent facts the user did not imply.
      - Prefer specific wording ("Unique identifier for each passenger row") over bare labels ("unique id").

      **rationale** on propose_facet_assignment — one short sentence for chat commentary above the facet card; same conciseness rules as payload descriptions.

  metadata.faceting.request:
    description: Structured extraction prior to facet capture.
    content: |
      Produce facet assignment proposal(s) with facetTypeKey, catalogPath (qualified database object name), payload map built from get_facet_type contentSchema, and rationale.
      Apply metadata-authoring.payload-style: kebab-case `name` slugs when present; rephrase descriptions for conciseness and completeness.
      Always validate before capture. Pass `catalogPath` only — the tool resolves the canonical entity URN server-side.
      When the user names multiple columns or rules, emit one proposal per (entity, facet type) — do not merge column semantics into a single table-level descriptive facet.

tools:
  propose_facet_assignment:
    description: |
      Proposes one facet payload assignment for one metadata entity. Call once per (catalogPath, facetTypeKey) pair.
      Pass the qualified database object name (`schema.table` or `schema.table.column`) — do not synthesize URNs.
      For model-level `concept` facets, pass catalogPath `model-entity` (or metadataEntityId `urn:mill/model/model:model-entity`).
      Follow `concept.capture` for business concept payloads (one concept per assignment; parallel calls for multiple concepts).
      Payload: use exact catalog facetTypeKey; kebab-case slug for any `name` field; rephrase `description` (and similar narrative fields) to be concise and complete.
      For multiple columns or mixed descriptive + data-quality rules, call this tool in parallel or across successive rounds until every user-requested facet is captured.
      Validates payload against catalog schema before emitting capture. Does not persist metadata scope inline — writeScopeUrns[] are stamped from AgentContext.
    kind: capture
    protocol: metadata.faceting.capture
    input:
      type: object
      required:
        - facetTypeKey
        - catalogPath
        - payload
      properties:
        facetTypeKey:
          type: string
          description: Exact catalog facet type key (lowercase, hyphen-separated), e.g. descriptive, dq-null-check.
        catalogPath:
          type: string
          description: Qualified database object name (`schema`, `schema.table`, `schema.table.column`) or `model-entity` for concept facets.
        metadataEntityId:
          type: string
          description: Deprecated alias for catalogPath or canonical URN; prefer catalogPath.
        payload:
          type: object
          additionalProperties: true
        rationale:
          type: string
          description: One concise sentence for chat commentary; summarize what was captured without repeating the full payload.
        candidateConceptLinks:
          type: array
          description: Optional concept-to-object link candidates (envelope only; outside serializedPayload).
          items:
            type: object
            required:
              - conceptRef
              - targetRef
            properties:
              conceptRef:
                type: string
              targetRef:
                type: string
              linkKind:
                type: string
              parentFacetArtifactId:
                type: string
    output:
      type: object
      properties:
        captureType:
          type: string
        facetTypeKey:
          type: string
        metadataEntityId:
          type: string
        serializedPayload:
          type: object
        writeScopeUrns:
          type: array
          items:
            type: string
        validationWarnings:
          type: array
          items:
            type: string
        candidateConceptLinks:
          type: array
          items:
            type: object

artifacts:
  inferred-facet:
    protocolId: metadata.faceting.capture
    artifactKind: facet-proposal
    persistKind: metadata.faceting.capture
    pointerKeys: [metadata-facet-proposals]
    wirePartType: facet-proposal
    presentation: structured
    protocolMode: STRUCTURED_FINAL
    sourceEvent: protocol.final
    emissionStrategy: OnCaptureSuccess
    destinations: [CHAT_STREAM, ARTIFACT]

protocols:
  metadata.faceting.capture:
    description: Structured final for facet assignment proposals (supports parallel multi-capture batch).
    mode: structured_final
    multi: true
    finalSchema:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              captureType:
                type: string
              facetTypeKey:
                type: string
              metadataEntityId:
                type: string
              serializedPayload:
                type: object
              writeScopeUrns:
                type: array
                items:
                  type: string
              validationWarnings:
                type: array
                items:
                  type: string
              candidateConceptLinks:
                type: array
                items:
                  type: object
        captureType:
          type: string
        facetTypeKey:
          type: string
        metadataEntityId:
          type: string
        serializedPayload:
          type: object
        writeScopeUrns:
          type: array
          items:
            type: string
        validationWarnings:
          type: array
          items:
            type: string
