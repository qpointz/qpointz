name: metadata-authoring
description: |
  Structured facet-assignment proposals for metadata entities (CAPTURE). Terminal synthesis uses metadata.faceting.capture.

prompts:
  metadata-authoring.intent:
    description: Classify user intent for metadata authoring vs SQL vs exploration.
    content: |
      Classify the user message:
      - AUTHOR_FACET — documentary metadata (descriptions, relations, data-quality rules, constraints)
      - DATA_QUERY — needs SQL / row retrieval
      - EXPLORE — schema discovery only
      - CHAT — general conversation
      Mixed utterances may require BOTH AUTHOR_FACET and DATA_QUERY in one turn (e.g. "customer_id must not be null AND show order counts").
      Decompose into subtasks; do not stop after the first structured result when another subtask remains.

  metadata-authoring.reasoning:
    description: Catalog-driven facet authoring loop.
    content: |
      For facet authoring:
      1. Ground target entity (schema tools) → metadataEntityId (urn:mill/model/…)
      2. list_metadata_scopes() — note writable scopes
      3. list_facet_categories() — pick category from dynamic guidance (not a hardcoded table)
      4. list_facet_types(category=…) — shortlist facetTypeKey
      5. get_facet_type(facetTypeKey) — build payload from contentSchema; use examples[] when present
      6. For relations: pick relation-source vs relation-target by grounded table role in the join
      7. validate_facet_payload(facetTypeKey, payload, metadataEntityId)
      8. propose_facet_assignment(target, facetType, payload) — no scope or merge args

  metadata-authoring.batch:
    description: Parallel multi-facet capture guidance.
    content: |
      When the user documents multiple independent facets in one turn, call propose_facet_assignment in parallel for each.
      On partial failure, persist every success; remediate failures in the next tool round — never all-or-nothing.
      Example: descriptive on one table + dq-null-check on a column → two parallel captures.

  metadata.faceting.request:
    description: Structured extraction prior to facet capture.
    content: |
      Produce a facet assignment proposal with facetTypeKey, metadataEntityId, payload map built from get_facet_type contentSchema, and rationale.
      Always validate before capture. For dq-null-check, payload requires name (and optional severity).

tools:
  propose_facet_assignment:
    description: |
      Proposes a facet payload assignment for a metadata entity. Validates payload against catalog schema before emitting capture.
      Does not persist metadata scope inline — writeScopeUrns[] are stamped from AgentContext.
    kind: capture
    protocol: metadata.faceting.capture
    input:
      type: object
      required:
        - facetTypeKey
        - metadataEntityId
        - payload
      properties:
        facetTypeKey:
          type: string
        metadataEntityId:
          type: string
        payload:
          type: object
          additionalProperties: true
        rationale:
          type: string
    output:
      type: object
      properties:
        captureType:
          type: string
        facetTypeKey:
          type: string
        metadataEntityId:
          type: string
        serializedPayload:
          type: object
        writeScopeUrns:
          type: array
          items:
            type: string
        validationWarnings:
          type: array
          items:
            type: string

artifacts:
  inferred-facet:
    protocolId: metadata.faceting.capture
    artifactKind: facet-proposal
    persistKind: metadata.faceting.capture
    pointerKeys: [metadata-facet-proposals]
    wirePartType: facet-proposal
    presentation: structured
    protocolMode: STRUCTURED_FINAL
    sourceEvent: protocol.final
    emissionStrategy: OnCaptureSuccess
    destinations: [CHAT_STREAM, ARTIFACT]

protocols:
  metadata.faceting.capture:
    description: Structured final for facet assignment proposals (supports parallel multi-capture batch).
    mode: structured_final
    multi: true
    finalSchema:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              captureType:
                type: string
              facetTypeKey:
                type: string
              metadataEntityId:
                type: string
              serializedPayload:
                type: object
              writeScopeUrns:
                type: array
                items:
                  type: string
              validationWarnings:
                type: array
                items:
                  type: string
        captureType:
          type: string
        facetTypeKey:
          type: string
        metadataEntityId:
          type: string
        serializedPayload:
          type: object
        writeScopeUrns:
          type: array
          items:
            type: string
        validationWarnings:
          type: array
          items:
            type: string
