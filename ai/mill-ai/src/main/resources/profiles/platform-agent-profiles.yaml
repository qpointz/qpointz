kind: AgentProfile
id: data-analysis
description: SQL generation plus optional facet capture for mixed documentary and query utterances
capabilities:
  - conversation
  - schema
  - metadata
  - metadata-authoring
  - concept
  - sql-dialect
  - sql-query
  - chart-mapping
  - value-mapping
prompts:
  data-analysis.intent:
    description: Profile-level intent routing for mixed SQL, schema discovery, facet capture, and business concepts.
    content: |
      Profile `data-analysis` composes non-overlapping capability intents. Apply in order; one message may match multiple:

      1. **sql-query.intent** — DATA_QUERY when the user wants data, SQL, counts, or aggregates.
      2. **chart-mapping.intent** — CHART_MAP when the user wants a chart or visualization.
      3. **concept.intent** — business/domain language (lookup or definition).
         Use concept discovery affordances as semantic hints before schema or SQL work. Do not classify DATA_QUERY here.
         For definition turns, complete concept.capture (model-grounded indicative SQL + facet-assignment capture for user accept/reject; clarify with the user when grounding is unclear).
      4. **schema.intent** — EXPLORE when the user wants schema structure only (no SQL generation).
      5. **metadata-authoring.intent** — AUTHOR_FACET when the user documents metadata (descriptions, relations, data-quality rules)
         **or defines agent instructions** on schema objects (SQL habits, join/projection rules).
         Resolve **facetTypeKey** from the facet catalog (metadata-authoring.reasoning); do not assume a fixed subset of types.
         All catalog facet types share the same accept/reject proposal lifecycle (metadata.faceting.lifecycle).

      Mixed utterances may require BOTH AUTHOR_FACET and DATA_QUERY in one turn (e.g. "customer_id must not be null AND show order counts").
      Decompose into subtasks; complete every subtask — do not stop after the first structured result when another remains.

      When none of the above apply, treat as CHAT (conversation capability).
---
kind: AgentProfile
id: analysis-copilot
description: Analysis inline copilot for SQL rewrite, optimization, and explanation over the current editor query
capabilities:
  - conversation
  - schema
  - metadata
  - metadata-authoring
  - sql-dialect
  - sql-query
prompts:
  analysis-copilot.intent:
    description: Profile-level intent routing for Analysis copilot turns over the current SQL editor state.
    content: |
      Profile `analysis-copilot` assists users editing SQL in the Analysis view. Reason primarily over the
      supplied current SQL and latest execution summary in the system prompt — not open-ended chat.

      Apply capability intents in order:

      1. **sql-query.intent** — DATA_QUERY when the user wants to rewrite, optimize, fix, explain, or validate SQL.
         Emit SQL proposals via validate_sql so the UI can show an actionable SQL artifact strip.
         Do not rely on markdown fenced SQL as the primary proposal path.
      2. **schema.intent** — EXPLORE only when schema grounding is required for the SQL task.
      3. **metadata-authoring.intent** — AUTHOR_FACET when the user explicitly documents metadata on schema objects.

      Do not route chart/visualization requests. Do not start broad schema tours unless the user asks.
      When none of the above apply, treat as CHAT (conversation capability).
