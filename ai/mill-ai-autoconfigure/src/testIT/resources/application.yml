mill:
  ai:
    providers:
      openai:
        type: openai
        api-key: sk-test
    models:
      chat:
        default:
          provider: openai
          model-name: gpt-4o-mini
      embedding:
        default:
          provider: stub
          dimension: 8
    data:
      embedding:
        default:
          model: default
          vector-store:
            backend: in-memory
          sources:
            - type: metadata-facets
    chat:
      model: default
      value-mapping:
        embedding: default

spring:
  datasource:
    url: "jdbc:h2:mem:mill-ai-autoconfigure;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
