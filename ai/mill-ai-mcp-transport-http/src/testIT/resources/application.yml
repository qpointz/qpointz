mill:
  ai:
    enabled: true
    mcp:
      enabled: true
      profile: hello-world
    providers:
      openai:
        type: openai
        api-key: sk-test
        base-url: https://api.openai.com/v1
    models:
      chat:
        default:
          provider: openai
          model-name: gpt-4o-mini
      embedding:
        default:
          provider: stub
          dimension: 8
    data:
      embedding:
        default:
          model: default
          vector-store:
            backend: in-memory
          sources:
            - type: metadata-facets
    chat:
      model: default
      value-mapping:
        embedding: default
  security:
    enable: false

spring:
  main:
    web-application-type: servlet
  datasource:
    url: "jdbc:h2:mem:mill-ai-mcp-it;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
