# Skymill + flow + query-result engine for sql-query MCP execution ITs.
spring:
  main:
    web-application-type: servlet
  config:
    activate:
      on-profile: sql-query-mcp-it
  datasource:
    url: "jdbc:h2:mem:mill-sql-query-mcp-it;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mill:
  ai:
    enabled: true
    mcp:
      enabled: true
      profile: data-analysis
    providers:
      openai:
        type: openai
        api-key: sk-test
        base-url: https://api.openai.com/v1
    models:
      chat:
        default:
          provider: openai
          model-name: gpt-4o-mini
      embedding:
        default:
          provider: stub
          dimension: 8
    data:
      embedding:
        default:
          model: default
          vector-store:
            backend: in-memory
          sources:
            - type: metadata-facets
    chat:
      model: default
      value-mapping:
        embedding: default
  security:
    enable: false
  data:
    sql:
      dialect: calcite
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    backend:
      type: flow
      flow:
        cache:
          schema:
            enabled: true
            ttl: 2m
        sources:
          - "${flow.facet.it.root}/data/mill-data-backends/config/test/flow-skymill.yaml"
  metadata:
    repository:
      type: file
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
        - "file:${flow.facet.it.root}/test/datasets/skymill/skymill-canonical.yaml"
        - "file:${flow.facet.it.root}/test/datasets/skymill/skymill-extras-seed.yaml"
