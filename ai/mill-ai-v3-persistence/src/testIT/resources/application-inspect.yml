# Inspection profile: uses file-backed H2 in PostgreSQL mode so persisted schema
# and rows remain on disk after the test run and can be inspected with an H2
# console or any JDBC client.
#
# Activate with: -Dspring.profiles.active=inspect
# Database files land in: build/inspect-db/mill-ai-v3.*
#
# H2 console URL: jdbc:h2:file:<repo>/ai/mill-ai-v3-persistence/build/inspect-db/mill-ai-v3
# Username: sa  Password: (empty)
spring:
  datasource:
    url: "jdbc:h2:file:./build/inspect-db/mill-ai-v3;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
