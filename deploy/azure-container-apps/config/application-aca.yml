# Optional overlay for Azure Container Apps (no secrets).
# Mount or set: SPRING_CONFIG_ADDITIONAL_LOCATION=file:/config/
# and copy this file into the container /config directory.
#
# Prefer environment secrets from deploy.sh (MILL_CLOUD_AZURE_ADLS_* , MILL_DB_*).
# Env vars override packaged application.yml.

spring:
  config:
    activate:
      on-profile: aca

mill:
  cloud:
    azure:
      adls:
        # Set via ACA secret → MILL_CLOUD_AZURE_ADLS_CONNECTION_STRING or blob-service-endpoint + managed identity
        connection-string: ${MILL_CLOUD_AZURE_ADLS_CONNECTION_STRING:}
        blob-service-endpoint: ${MILL_CLOUD_AZURE_ADLS_BLOB_SERVICE_ENDPOINT:}

logging:
  level:
    root: INFO
