# Local → GCS object mappings for ./sync-bucket.sh and deploy (GCS_SYNC_ENABLED=true).
# Format:  local_path | gcs_path_under_bucket
# Paths are relative to the repository root unless absolute.
# Lines starting with # are ignored. Use trailing / on both sides for directory rsync.

# Skymill flow descriptor + metadata seeds (for gs://… config URLs in application-cloudrun-gcs.yml)
apps/mill-service/config/skymill/skymill-flow.yml | skymill/config/skymill-flow.yml
test/datasets/skymill/skymill-canonical.yaml | skymill/config/skymill-canonical.yaml
test/datasets/skymill/skymill-extras-seed.yaml | skymill/config/skymill-extras-seed.yaml

# Optional: sync entire skymill CSV dataset for flow data paths inside the descriptor
# test/datasets/skymill/csv/ | skymill/data/csv/
