spring:
  config:
    activate:
      on-profile: ai

mill:
  ai:
    enabled: ${enable}
    providers:
      openai:
        type: openai
        api-key: $${OPENAI_API_KEY}
        base-url: $${OPENAI_BASE_URL:https://api.openai.com/v1}
    models:
      chat:
        default:
          provider: openai
          model-name: "${openai.model}"
      embedding:
        default:
          provider: openai
          model-name: "${openai.embedding.model}"
          dimension: ${openai.embedding.dimension}
    mcp:
      enabled: true
      profile: $${MILL_MCP_PROFILE:data-analysis}
      http:
        endpoint: $${MILL_MCP_HTTP_ENDPOINT:/services/mcp}
    data:
      embedding:
        default:
          model: default
          vector-store:
            backend: pgvector
            pgvector:
              table: ai_value_mapping_vector
              create-table: true
          max-content-length: 2048
          refresh:
            on-startup:
              enabled: true
            schedule:
              enabled: true
              interval: PT15M
          sources:
            - type: metadata-facets
    chat:
      model: default
      value-mapping:
        embedding: default
      default-profile: schema-authoring
      default-user-id: default
      max-title-length: 30
