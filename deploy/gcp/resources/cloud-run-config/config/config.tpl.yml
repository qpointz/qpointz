spring:
  config:
    activate:
      on-profile: cloud-run

server:
  forward-headers-strategy: framework

logging:
  level:
    root: info
    io.qpointz: DEBUG
    # Cloud Run: stdout JSON (profile gcp) and no file appender.
  file:
    enabled: false
  structured:
    format:
      console: logstash
    json:
      rename:
        level: severity

mill:
  application:
    name: ${application_name}
    hosts:
      externals:
        http:
          scheme: http
          host: localhost
          port: 8080
        http-request:
          scheme: "@request.scheme"
          host: "@request.host"
          port: "@request.port"
        grpc-request:
          scheme: grpc
          host: "@request.host"
          port: 9090
  data:
    sql:
      dialect: CALCITE
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    services:
      grpc:
        enable: false
      http:
        enable: true
        external-host: http-request
      export:
        enable: true
        external-host: http-request
      query:
        enable: true
        external-host: http-request
  cloud:
    gcp:
      gcs:
        project-id: "${project_id}"
  ui:
    enabled: ${ui_enabled}
  metadata:
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
  %{ for s in metadata_seeds }
        - ${s.path}
  %{endfor }