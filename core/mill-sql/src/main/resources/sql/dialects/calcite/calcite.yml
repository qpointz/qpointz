id: CALCITE
name: Apache Calcite
read-only: true
paramstyle: qmark
notes: []
identifiers:
  quote:
    start: '`'
    end: '`'
  alias-quote:
    start: '`'
    end: '`'
  use-fully-qualified-names: true
  escape-quote: '`'
  unquoted-storage: AS_IS
  quoted-storage: AS_IS
  supports-mixed-case: true
  supports-mixed-case-quoted: true
  max-length: 256
  extra-name-characters: ''
catalog-schema:
  supports-schemas: true
  supports-catalogs: false
  catalog-separator: .
  catalog-at-start: true
  schema-term: schema
  catalog-term: catalog
  procedure-term: procedure
  schemas-in-dml: true
  schemas-in-procedure-calls: false
  schemas-in-table-definitions: false
  schemas-in-index-definitions: false
  schemas-in-privilege-definitions: false
  catalogs-in-dml: false
  catalogs-in-procedure-calls: false
  catalogs-in-table-definitions: false
  catalogs-in-index-definitions: false
  catalogs-in-privilege-definitions: false
transactions:
  supported: false
  default-isolation: NONE
  supports-multiple: false
  supports-ddl-and-dml: false
  supports-dml-only: false
  ddl-causes-commit: false
  ddl-ignored-in-transactions: false
limits:
  max-binary-literal-length: 0
  max-char-literal-length: 0
  max-column-name-length: 256
  max-columns-in-group-by: 0
  max-columns-in-index: 0
  max-columns-in-order-by: 0
  max-columns-in-select: 0
  max-columns-in-table: 0
  max-connections: 0
  max-index-length: 0
  max-schema-name-length: 256
  max-catalog-name-length: 256
  max-row-size: 0
  max-row-size-includes-blobs: false
  max-statement-length: 0
  max-statements: 0
  max-table-name-length: 256
  max-tables-in-select: 0
null-sorting:
  nulls-sorted-high: false
  nulls-sorted-low: true
  nulls-sorted-at-start: false
  nulls-sorted-at-end: false
  supports-nulls-first: false
  supports-nulls-last: false
result-set:
  forward-only: true
  scroll-insensitive: false
  scroll-sensitive: false
  concurrency-read-only: true
  concurrency-updatable: false
feature-flags:
  supports-column-aliasing: true
  supports-expressions-in-order-by: true
  supports-order-by-unrelated: false
  supports-group-by: true
  supports-group-by-unrelated: false
  supports-group-by-beyond-select: false
  supports-like-escape-clause: true
  supports-non-nullable-columns: false
  supports-table-correlation-names: true
  supports-different-table-correlation-names: false
  null-plus-non-null-is-null: true
  supports-convert: true
  supports-outer-joins: true
  supports-full-outer-joins: true
  supports-limited-outer-joins: true
  supports-semi-anti-join: false
  supports-lateral: false
  supports-subqueries-in-comparisons: true
  supports-subqueries-in-exists: true
  supports-subqueries-in-ins: true
  supports-subqueries-in-quantifieds: true
  supports-correlated-subqueries: true
  supports-union: true
  supports-union-all: true
  supports-intersect: true
  supports-except: true
  supports-cte: true
  supports-window-functions: true
  supports-qualify: false
  supports-is-distinct-from: true
  supports-ilike: false
  supports-try-cast: false
  supports-native-boolean: true
  div-is-floordiv: null
  supports-alter-table-add-column: false
  supports-alter-table-drop-column: false
  supports-select-for-update: false
  supports-stored-procedures: false
  supports-batch-updates: false
  supports-savepoints: false
  supports-named-parameters: false
  supports-multiple-result-sets: false
  supports-multiple-open-results: false
  supports-get-generated-keys: false
  supports-statement-pooling: false
  supports-stored-functions-using-call-syntax: false
  supports-positioned-delete: false
  supports-positioned-update: false
  supports-minimum-sql-grammar: true
  supports-core-sql-grammar: true
  supports-extended-sql-grammar: false
  supports-ansi92-entry-level: true
  supports-ansi92-intermediate: false
  supports-ansi92-full: false
  supports-integrity-enhancement: false
  auto-commit-failure-closes-all-result-sets: false
  generated-key-always-returned: false
string-properties:
  search-string-escape: \\
  sql-keywords: ''
  system-functions: ''
literals:
  strings:
    quote: ''''
    concat: '||'
    escape: STANDARD
    note: Use single quotes for string literals; concatenation with ||.
  booleans:
  - 'TRUE'
  - 'FALSE'
  null: 'NULL'
  dates-times:
    date:
      syntax: DATE 'YYYY-MM-DD'
      quote: ''''
      pattern: YYYY-MM-DD
      notes:
      - ANSI DATE literal format.
    time:
      syntax: TIME 'HH:MI:SS'
      quote: ''''
      pattern: HH:MI:SS
      notes:
      - 24-hour clock; fractional seconds may be supported by engine.
    timestamp:
      syntax: TIMESTAMP 'YYYY-MM-DD HH:MI:SS'
      quote: ''''
      pattern: YYYY-MM-DD HH:MI:SS
      notes:
      - ANSI TIMESTAMP literal format.
    interval:
      supported: true
      style: ANSI
      notes:
      - ANSI INTERVAL syntax (e.g., INTERVAL '1' DAY).
joins:
  style: explicit
  cross-join:
    enabled: true
    keyword: CROSS JOIN
  inner-join:
    keyword: INNER JOIN
    require-on: true
    null-safe: false
  left-join:
    enabled: true
    keyword: LEFT JOIN
    null-safe: false
    require-on: true
  right-join:
    keyword: RIGHT JOIN
    enabled: true
    null-safe: false
    require-on: true
  full-join:
    keyword: FULL JOIN
    enabled: true
    null-safe: false
    require-on: true
  on-clause:
    keyword: 'ON'
    require-condition: true
paging:
  styles:
  - syntax: LIMIT {n}
    type: standard
  offset: OFFSET {m}
  no-limit-value: null
operators:
  equality:
  - symbol: '='
    description: Equality comparison
  inequality:
  - symbol: <>
    description: Not equal
  - symbol: '!='
    description: Not equal (alternative)
  comparison:
  - symbol: '>'
    description: Greater than
  - symbol: '>='
    description: Greater than or equal
  - symbol: <
    description: Less than
  - symbol: <=
    description: Less than or equal
  set:
  - symbol: IN
    description: Membership test
  - symbol: NOT IN
    description: Negated membership test
  null-safe:
  - symbol: IS NOT DISTINCT FROM
    description: Null-safe equality (ANSI-style)
  logical:
  - symbol: NOT
    description: Logical NOT
  - symbol: AND
    description: Logical AND
  - symbol: OR
    description: Logical OR
  like:
  - symbol: LIKE
    description: Pattern match with wildcards
  between:
  - symbol: BETWEEN
    description: Inclusive range comparison
  casting:
  - symbol: CAST
    syntax: CAST({expr} AS {type})
    description: Explicit type cast
    supported: true
  - symbol: SAFE_CAST
    syntax: null
    description: Not supported natively; use CAST and handle errors upstream
    supported: false
  regex:
  - symbol: REGEXP
    description: Regex match operator (if enabled by engine/integration)
  arithmetic:
  - symbol: +
    description: Addition
  - symbol: '-'
    description: Subtraction
  - symbol: '*'
    description: Multiplication
  - symbol: /
    description: Division
  - symbol: '%'
    description: Modulo
  null-checks:
  - symbol: IS NULL
    description: Check for null
  - symbol: IS NOT NULL
    description: Check for not null
functions:
  strings:
  - name: LENGTH
    return:
      type: INTEGER
      nullable: false
    syntax: LENGTH(text)
    args:
    - name: text
      type: STRING
      required: true
      notes: Returns character length.
  - name: CHAR_LENGTH
    return:
      type: INTEGER
      nullable: false
    syntax: CHAR_LENGTH(text)
    args:
    - name: text
      type: STRING
      required: true
      notes: Alias for LENGTH in many engines.
  - name: LOWER
    return:
      type: STRING
      nullable: true
    syntax: LOWER(text)
    args:
    - name: text
      type: STRING
      required: true
  - name: UPPER
    return:
      type: STRING
      nullable: true
    syntax: UPPER(text)
    args:
    - name: text
      type: STRING
      required: true
  - name: SUBSTRING
    synonyms:
    - SUBSTR
    return:
      type: STRING
      nullable: true
    syntax: SUBSTRING(text FROM start FOR length)
    args:
    - name: text
      type: STRING
      required: true
      notes: Source string.
    - name: start
      type: INTEGER
      required: true
      min: 1
      notes: 1-based index.
    - name: length
      type: INTEGER
      required: false
      min: 0
      notes: Optional length; if omitted, to end of string.
  - name: POSITION
    return:
      type: INTEGER
      nullable: true
    syntax: POSITION(substr IN text)
    args:
    - name: substr
      type: STRING
      required: true
    - name: text
      type: STRING
      required: true
  - name: TRIM
    return:
      type: STRING
      nullable: true
    syntax: TRIM([LEADING|TRAILING|BOTH] [chars] FROM text)
    args:
    - name: chars
      type: STRING
      required: false
      notes: Characters to trim (optional).
    - name: text
      type: STRING
      required: true
  - name: REPLACE
    return:
      type: STRING
      nullable: true
    syntax: REPLACE(text, from_str, to_str)
    args:
    - name: text
      type: STRING
      required: true
    - name: from_str
      type: STRING
      required: true
    - name: to_str
      type: STRING
      required: true
  - name: CONCAT
    return:
      type: STRING
      nullable: true
    syntax: CONCAT(a, b, ...)
    args:
    - name: a
      type: STRING
      required: true
    - name: b
      type: STRING
      required: true
      variadic: true
  regex:
  - name: REGEXP_LIKE
    return:
      type: BOOLEAN
      nullable: false
    syntax: REGEXP_LIKE(text, pattern)
    args:
    - name: text
      type: STRING
      required: true
      notes: Left-hand expression.
    - name: pattern
      type: PATTERN
      required: true
      notes: Regular expression pattern.
  - name: REGEXP_REPLACE
    return:
      type: STRING
      nullable: true
    syntax: REGEXP_REPLACE(text, pattern, replacement)
    args:
    - name: text
      type: STRING
      required: true
    - name: pattern
      type: PATTERN
      required: true
    - name: replacement
      type: STRING
      required: true
  numerics:
  - name: ROUND
    return:
      type: DECIMAL
      nullable: true
    syntax: ROUND(num[, scale])
    args:
    - name: num
      type: DECIMAL
      required: true
    - name: scale
      type: INTEGER
      required: false
      min: 0
  - name: TRUNC
    return:
      type: DECIMAL
      nullable: true
    syntax: TRUNC(num[, scale])
    args:
    - name: num
      type: DECIMAL
      required: true
    - name: scale
      type: INTEGER
      required: false
      min: 0
  - name: CEIL
    synonyms:
    - CEILING
    return:
      type: DECIMAL
      nullable: true
    syntax: CEIL(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: FLOOR
    return:
      type: DECIMAL
      nullable: true
    syntax: FLOOR(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: ABS
    return:
      type: DECIMAL
      nullable: true
    syntax: ABS(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: POWER
    return:
      type: DECIMAL
      nullable: true
    syntax: POWER(base, exp)
    args:
    - name: base
      type: DECIMAL
      required: true
    - name: exp
      type: DECIMAL
      required: true
  - name: MOD
    return:
      type: INTEGER
      nullable: true
    syntax: MOD(a, b)
    args:
    - name: a
      type: INTEGER
      required: true
    - name: b
      type: INTEGER
      required: true
  aggregates:
  - name: COUNT
    return:
      type: INTEGER
      nullable: false
    syntax: COUNT(expr)
    args:
    - name: expr
      type: COLUMN_REF
      required: false
      default: '*'
      notes: COUNT(*) allowed.
  - name: SUM
    return:
      type: DECIMAL
      nullable: true
    syntax: SUM(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: AVG
    return:
      type: DECIMAL
      nullable: true
    syntax: AVG(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: MIN
    return:
      type: DECIMAL
      nullable: true
    syntax: MIN(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: MAX
    return:
      type: DECIMAL
      nullable: true
    syntax: MAX(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  conditionals:
  - name: COALESCE
    return:
      type: STRING
      nullable: true
    syntax: COALESCE(a, b, ...)
    args:
    - name: a
      type: STRING
      required: true
      variadic: true
  - name: NULLIF
    return:
      type: STRING
      nullable: true
    syntax: NULLIF(a, b)
    args:
    - name: a
      type: STRING
      required: true
    - name: b
      type: STRING
      required: true
  - name: CASE
    return:
      type: STRING
      nullable: true
    syntax: CASE WHEN condition THEN result [ELSE result] END
    args:
    - name: condition
      type: BOOLEAN
      required: true
    - name: result
      type: STRING
      required: true
      variadic: true
  dates-times:
  - name: CURRENT_DATE
    return:
      type: DATE
      nullable: false
    syntax: CURRENT_DATE
    args: []
  - name: CURRENT_TIMESTAMP
    return:
      type: TIMESTAMP
      nullable: false
    syntax: CURRENT_TIMESTAMP
    args: []
  - name: EXTRACT
    return:
      type: INTEGER
      nullable: true
    syntax: EXTRACT(field FROM ts)
    args:
    - name: field
      type: ENUM
      required: true
      enum:
      - YEAR
      - MONTH
      - DAY
      - HOUR
      - MINUTE
      - SECOND
      notes: Extract unit.
    - name: ts
      type: TIMESTAMP
      required: true
  - name: TIMESTAMPADD
    return:
      type: TIMESTAMP
      nullable: false
    syntax: TIMESTAMPADD(unit, interval, ts)
    args:
    - name: unit
      type: ENUM
      required: true
      enum:
      - YEAR
      - MONTH
      - DAY
      - HOUR
      - MINUTE
      - SECOND
    - name: interval
      type: INTEGER
      required: true
    - name: ts
      type: TIMESTAMP
      required: true
  - name: TIMESTAMPDIFF
    return:
      type: INTEGER
      nullable: false
    syntax: TIMESTAMPDIFF(unit, ts1, ts2)
    args:
    - name: unit
      type: ENUM
      required: true
      enum:
      - YEAR
      - MONTH
      - DAY
      - HOUR
      - MINUTE
      - SECOND
    - name: ts1
      type: TIMESTAMP
      required: true
    - name: ts2
      type: TIMESTAMP
      required: true
  - name: FLOOR_TS
    return:
      type: TIMESTAMP
      nullable: false
    syntax: FLOOR(ts TO unit)
    args:
    - name: ts
      type: TIMESTAMP
      required: true
    - name: unit
      type: ENUM
      required: true
      enum:
      - YEAR
      - MONTH
      - DAY
      - HOUR
      - MINUTE
      - SECOND
      notes: Truncation unit.
  - name: CEIL_TS
    return:
      type: TIMESTAMP
      nullable: false
    syntax: CEIL(ts TO unit)
    args:
    - name: ts
      type: TIMESTAMP
      required: true
    - name: unit
      type: ENUM
      required: true
      enum:
      - YEAR
      - MONTH
      - DAY
      - HOUR
      - MINUTE
      - SECOND
      notes: Ceiling to unit.
  math:
  - name: SQRT
    return:
      type: DECIMAL
      nullable: true
    syntax: SQRT(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: LN
    return:
      type: DECIMAL
      nullable: true
    syntax: LN(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: EXP
    return:
      type: DECIMAL
      nullable: true
    syntax: EXP(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  statistics:
  - name: STDDEV_POP
    return:
      type: DECIMAL
      nullable: true
    syntax: STDDEV_POP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: STDDEV_SAMP
    return:
      type: DECIMAL
      nullable: true
    syntax: STDDEV_SAMP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: VAR_POP
    return:
      type: DECIMAL
      nullable: true
    syntax: VAR_POP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: VAR_SAMP
    return:
      type: DECIMAL
      nullable: true
    syntax: VAR_SAMP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  window:
  - name: ROW_NUMBER
    return:
      type: BIGINT
      nullable: false
    syntax: ROW_NUMBER() OVER (...)
    args: []
  - name: RANK
    return:
      type: BIGINT
      nullable: false
    syntax: RANK() OVER (...)
    args: []
  - name: DENSE_RANK
    return:
      type: BIGINT
      nullable: false
    syntax: DENSE_RANK() OVER (...)
    args: []
  - name: LAG
    return:
      type: ANY
      nullable: true
    syntax: LAG(value[, offset[, default]]) OVER (...)
    args: []
  - name: LEAD
    return:
      type: ANY
      nullable: true
    syntax: LEAD(value[, offset[, default]]) OVER (...)
    args: []
type-info:
- sql-name: BOOLEAN
  jdbc-type-code: 16
  precision: 1
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
- sql-name: INTEGER
  jdbc-type-code: 4
  precision: 32
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 2
- sql-name: BIGINT
  jdbc-type-code: -5
  precision: 64
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 2
- sql-name: DOUBLE
  jdbc-type-code: 8
  precision: 53
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 17
  num-prec-radix: 2
- sql-name: VARCHAR
  jdbc-type-code: 12
  precision: 0
  literal-prefix: ''''
  literal-suffix: ''''
  case-sensitive: true
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
- sql-name: DATE
  jdbc-type-code: 91
  precision: 10
  literal-prefix: DATE '''
  literal-suffix: ''''
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
- sql-name: TIMESTAMP
  jdbc-type-code: 93
  precision: 29
  literal-prefix: TIMESTAMP '''
  literal-suffix: ''''
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 6
  num-prec-radix: 10
- sql-name: VARBINARY
  jdbc-type-code: -3
  precision: 0
  case-sensitive: true
  searchable: 2
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
