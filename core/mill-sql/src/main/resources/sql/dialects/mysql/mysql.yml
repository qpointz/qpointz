id: MYSQL
name: MySQL
read-only: false
paramstyle: qmark
notes: []
identifiers:
  quote:
    start: '`'
    end: '`'
  alias-quote:
    start: '`'
    end: '`'
  use-fully-qualified-names: true
  escape-quote: '`'
  unquoted-storage: AS_IS
  quoted-storage: AS_IS
  supports-mixed-case: true
  supports-mixed-case-quoted: true
  max-length: 256
  extra-name-characters: ''
catalog-schema:
  supports-schemas: false
  supports-catalogs: true
  catalog-separator: .
  catalog-at-start: true
  schema-term: schema
  catalog-term: database
  procedure-term: procedure
  schemas-in-dml: false
  schemas-in-procedure-calls: false
  schemas-in-table-definitions: false
  schemas-in-index-definitions: false
  schemas-in-privilege-definitions: false
  catalogs-in-dml: true
  catalogs-in-procedure-calls: false
  catalogs-in-table-definitions: false
  catalogs-in-index-definitions: false
  catalogs-in-privilege-definitions: false
transactions:
  supported: true
  default-isolation: REPEATABLE_READ
  supports-multiple: true
  supports-ddl-and-dml: false
  supports-dml-only: true
  ddl-causes-commit: true
  ddl-ignored-in-transactions: false
limits:
  max-binary-literal-length: 0
  max-char-literal-length: 0
  max-column-name-length: 256
  max-columns-in-group-by: 0
  max-columns-in-index: 0
  max-columns-in-order-by: 0
  max-columns-in-select: 0
  max-columns-in-table: 0
  max-connections: 0
  max-index-length: 0
  max-schema-name-length: 256
  max-catalog-name-length: 256
  max-row-size: 0
  max-row-size-includes-blobs: false
  max-statement-length: 0
  max-statements: 0
  max-table-name-length: 256
  max-tables-in-select: 0
null-sorting:
  nulls-sorted-high: false
  nulls-sorted-low: true
  nulls-sorted-at-start: false
  nulls-sorted-at-end: false
  supports-nulls-first: false
  supports-nulls-last: false
result-set:
  forward-only: true
  scroll-insensitive: false
  scroll-sensitive: false
  concurrency-read-only: true
  concurrency-updatable: false
feature-flags:
  supports-column-aliasing: true
  supports-expressions-in-order-by: true
  supports-order-by-unrelated: true
  supports-group-by: true
  supports-group-by-unrelated: true
  supports-group-by-beyond-select: true
  supports-like-escape-clause: true
  supports-non-nullable-columns: true
  supports-table-correlation-names: true
  supports-different-table-correlation-names: true
  null-plus-non-null-is-null: true
  supports-convert: true
  supports-outer-joins: true
  supports-full-outer-joins: false
  supports-limited-outer-joins: true
  supports-semi-anti-join: true
  supports-lateral: true
  supports-subqueries-in-comparisons: true
  supports-subqueries-in-exists: true
  supports-subqueries-in-ins: true
  supports-subqueries-in-quantifieds: true
  supports-correlated-subqueries: true
  supports-union: true
  supports-union-all: true
  supports-intersect: true
  supports-except: true
  supports-cte: true
  supports-window-functions: true
  supports-qualify: false
  supports-is-distinct-from: true
  supports-ilike: false
  supports-try-cast: false
  supports-native-boolean: false
  div-is-floordiv: null
  supports-alter-table-add-column: true
  supports-alter-table-drop-column: true
  supports-select-for-update: true
  supports-stored-procedures: true
  supports-batch-updates: true
  supports-savepoints: true
  supports-named-parameters: false
  supports-multiple-result-sets: true
  supports-multiple-open-results: false
  supports-get-generated-keys: true
  supports-statement-pooling: false
  supports-stored-functions-using-call-syntax: true
  supports-positioned-delete: false
  supports-positioned-update: false
  supports-minimum-sql-grammar: true
  supports-core-sql-grammar: true
  supports-extended-sql-grammar: false
  supports-ansi92-entry-level: true
  supports-ansi92-intermediate: false
  supports-ansi92-full: false
  supports-integrity-enhancement: false
  auto-commit-failure-closes-all-result-sets: false
  generated-key-always-returned: false
string-properties:
  search-string-escape: \\
  sql-keywords: ''
  system-functions: ''
literals:
  strings:
    quote: ''''
    concat: CONCAT
    escape: STANDARD
    note: Escape single quotes by doubling them ('') or with backslash if enabled
  booleans:
  - 'TRUE'
  - 'FALSE'
  null: 'NULL'
  dates-times:
    date:
      syntax: DATE 'YYYY-MM-DD'
      quote: ''''
      pattern: YYYY-MM-DD
      notes:
      - ANSI DATE literal supported
    time:
      syntax: TIME 'HH:MM:SS'
      quote: ''''
      pattern: HH:MM:SS
      notes:
      - TIME values stored with range -838:59:59 to 838:59:59
    timestamp:
      syntax: TIMESTAMP 'YYYY-MM-DD HH:MM:SS'
      quote: ''''
      pattern: YYYY-MM-DD HH:MM:SS
      notes:
      - Supports fractional seconds from MySQL 5.6+
    interval:
      supported: true
      style: MYSQL
      notes:
      - INTERVAL keyword used with DATE_ADD/DATE_SUB (e.g., DATE_ADD(NOW(), INTERVAL 1 DAY))
joins:
  style: explicit
  cross-join:
    enabled: true
    keyword: CROSS JOIN
  inner-join:
    keyword: INNER JOIN
    require-on: true
    null-safe: false
  left-join:
    enabled: true
    keyword: LEFT JOIN
    null-safe: false
    require-on: true
  right-join:
    enabled: true
    keyword: RIGHT JOIN
    null-safe: false
    require-on: true
  full-join:
    keyword: null
    enabled: false
    null-safe: false
    require-on: true
    notes: MySQL does not support FULL OUTER JOIN natively
  on-clause:
    keyword: 'ON'
    require-condition: true
paging:
  styles:
  - syntax: LIMIT {n}
    type: standard
  offset: OFFSET {m}
  no-limit-value: null
operators:
  equality:
  - symbol: '='
    description: Equality comparison
  - symbol: <=>
    description: NULL-safe equality
  inequality:
  - symbol: <>
    description: Not equal
  - symbol: '!='
    description: Not equal (alternative)
  comparison:
  - symbol: '>'
    description: Greater than
  - symbol: '>='
    description: Greater than or equal
  - symbol: <
    description: Less than
  - symbol: <=
    description: Less than or equal
  set:
  - symbol: IN
    description: Membership test
  - symbol: NOT IN
    description: Negated membership test
  logical:
  - symbol: NOT
    description: Logical NOT
  - symbol: AND
    description: Logical AND
  - symbol: OR
    description: Logical OR
  like:
  - symbol: LIKE
    description: Pattern match with wildcards
  between:
  - symbol: BETWEEN
    description: Inclusive range comparison
  casting:
  - symbol: CAST
    syntax: CAST({expr} AS {type})
    description: ANSI SQL cast
    supported: true
  - symbol: CONVERT
    syntax: CONVERT({expr}, {type})
    description: MySQL-specific cast/convert
    supported: true
  regex:
  - symbol: REGEXP
    description: Regex match (case-insensitive default)
  - symbol: RLIKE
    description: Synonym for REGEXP
  arithmetic:
  - symbol: +
    description: Addition
  - symbol: '-'
    description: Subtraction
  - symbol: '*'
    description: Multiplication
  - symbol: /
    description: Division
  - symbol: '%'
    description: Modulo
  null-checks:
  - symbol: IS NULL
    description: Check for null
  - symbol: IS NOT NULL
    description: Check for not null
functions:
  strings:
  - name: SUBSTRING
    synonyms:
    - SUBSTR
    return:
      type: STRING
      nullable: true
    syntax: SUBSTRING(string, start, length)
    args:
    - name: string
      type: STRING
      required: true
      notes: Input string
    - name: start
      type: INTEGER
      required: true
      notes: Starting position (1-based)
    - name: length
      type: INTEGER
      required: false
      notes: Substring length
  - name: CONCAT
    return:
      type: STRING
      nullable: true
    syntax: CONCAT(a, b, ...)
    args:
    - name: a
      type: STRING
      required: true
      variadic: true
      notes: Strings to concatenate
  - name: LENGTH
    return:
      type: INTEGER
      nullable: true
    syntax: LENGTH(string)
    args:
    - name: string
      type: STRING
      required: true
      notes: String to measure
  - name: LOWER
    return:
      type: STRING
      nullable: true
    syntax: LOWER(string)
    args:
    - name: string
      type: STRING
      required: true
      notes: Convert to lowercase
  - name: UPPER
    return:
      type: STRING
      nullable: true
    syntax: UPPER(string)
    args:
    - name: string
      type: STRING
      required: true
      notes: Convert to uppercase
  regex:
  - name: REGEXP_LIKE
    return:
      type: BOOLEAN
      nullable: false
    syntax: expr REGEXP pattern
    args:
    - name: expr
      type: STRING
      required: true
      notes: Input expression
    - name: pattern
      type: PATTERN
      required: true
      notes: Regex pattern
  numerics:
  - name: ROUND
    return:
      type: DECIMAL
      nullable: true
    syntax: ROUND(num[, decimals])
    args:
    - name: num
      type: DECIMAL
      required: true
      notes: Number to round
    - name: decimals
      type: INTEGER
      required: false
      notes: Number of decimal places
  - name: CEIL
    synonyms:
    - CEILING
    return:
      type: DECIMAL
      nullable: true
    syntax: CEIL(num)
    args:
    - name: num
      type: DECIMAL
      required: true
      notes: Number to round up
  - name: FLOOR
    return:
      type: DECIMAL
      nullable: true
    syntax: FLOOR(num)
    args:
    - name: num
      type: DECIMAL
      required: true
      notes: Number to round down
  aggregates:
  - name: COUNT
    return:
      type: INTEGER
      nullable: false
    syntax: COUNT(expr)
    args:
    - name: expr
      type: COLUMN_REF
      required: false
      default: '*'
      notes: Expression or *
  - name: AVG
    return:
      type: DECIMAL
      nullable: true
    syntax: AVG(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
      notes: Numeric expression
  - name: GROUP_CONCAT
    return:
      type: STRING
      nullable: true
    syntax: GROUP_CONCAT(expr [ORDER BY expr] SEPARATOR ',')
    args:
    - name: expr
      type: STRING
      required: true
      notes: Expression to concatenate
  conditionals:
  - name: COALESCE
    return:
      type: STRING
      nullable: true
    syntax: COALESCE(a, b, ...)
    args:
    - name: a
      type: STRING
      required: true
      variadic: true
      notes: Arguments to evaluate
  - name: IFNULL
    return:
      type: STRING
      nullable: true
    syntax: IFNULL(expr1, expr2)
    args:
    - name: expr1
      type: STRING
      required: true
      notes: Expression to check
    - name: expr2
      type: STRING
      required: true
      notes: Value if expr1 is NULL
  - name: NULLIF
    return:
      type: STRING
      nullable: true
    syntax: NULLIF(expr1, expr2)
    args:
    - name: expr1
      type: STRING
      required: true
      notes: First expression
    - name: expr2
      type: STRING
      required: true
      notes: Second expression
  dates-times:
  - name: NOW
    return:
      type: TIMESTAMP
      nullable: false
    syntax: NOW()
    args: []
  - name: CURDATE
    return:
      type: DATE
      nullable: false
    syntax: CURDATE()
    args: []
  - name: DATE_ADD
    return:
      type: DATE
      nullable: true
    syntax: DATE_ADD(date, INTERVAL expr unit)
    args:
    - name: date
      type: DATE
      required: true
      notes: Base date
    - name: expr
      type: INTEGER
      required: true
      notes: Value to add
    - name: unit
      type: ENUM
      required: true
      enum:
      - DAY
      - MONTH
      - YEAR
      - HOUR
      - MINUTE
      - SECOND
      notes: Interval unit
  - name: DATE_SUB
    return:
      type: DATE
      nullable: true
    syntax: DATE_SUB(date, INTERVAL expr unit)
    args:
    - name: date
      type: DATE
      required: true
      notes: Base date
    - name: expr
      type: INTEGER
      required: true
      notes: Value to subtract
    - name: unit
      type: ENUM
      required: true
      enum:
      - DAY
      - MONTH
      - YEAR
      - HOUR
      - MINUTE
      - SECOND
      notes: Interval unit
  math:
  - name: SQRT
    return:
      type: DECIMAL
      nullable: true
    syntax: SQRT(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: LN
    return:
      type: DECIMAL
      nullable: true
    syntax: LN(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  - name: EXP
    return:
      type: DECIMAL
      nullable: true
    syntax: EXP(num)
    args:
    - name: num
      type: DECIMAL
      required: true
  statistics:
  - name: STDDEV_POP
    return:
      type: DECIMAL
      nullable: true
    syntax: STDDEV_POP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: STDDEV_SAMP
    return:
      type: DECIMAL
      nullable: true
    syntax: STDDEV_SAMP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: VAR_POP
    return:
      type: DECIMAL
      nullable: true
    syntax: VAR_POP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  - name: VAR_SAMP
    return:
      type: DECIMAL
      nullable: true
    syntax: VAR_SAMP(expr)
    args:
    - name: expr
      type: DECIMAL
      required: true
  window:
  - name: ROW_NUMBER
    return:
      type: BIGINT
      nullable: false
    syntax: ROW_NUMBER() OVER (...)
    args: []
  - name: RANK
    return:
      type: BIGINT
      nullable: false
    syntax: RANK() OVER (...)
    args: []
  - name: DENSE_RANK
    return:
      type: BIGINT
      nullable: false
    syntax: DENSE_RANK() OVER (...)
    args: []
  - name: LAG
    return:
      type: ANY
      nullable: true
    syntax: LAG(value[, offset[, default]]) OVER (...)
    args: []
  - name: LEAD
    return:
      type: ANY
      nullable: true
    syntax: LEAD(value[, offset[, default]]) OVER (...)
    args: []
type-info:
- sql-name: BOOLEAN
  jdbc-type-code: 16
  precision: 1
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
- sql-name: INT
  jdbc-type-code: 4
  precision: 32
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: true
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 2
- sql-name: BIGINT
  jdbc-type-code: -5
  precision: 64
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: true
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 2
- sql-name: DOUBLE
  jdbc-type-code: 8
  precision: 53
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 17
  num-prec-radix: 2
- sql-name: VARCHAR
  jdbc-type-code: 12
  precision: 65535
  literal-prefix: ''''
  literal-suffix: ''''
  case-sensitive: true
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
- sql-name: DATE
  jdbc-type-code: 91
  precision: 10
  literal-prefix: DATE '''
  literal-suffix: ''''
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
- sql-name: DATETIME
  jdbc-type-code: 93
  precision: 26
  literal-prefix: ''''
  literal-suffix: ''''
  case-sensitive: false
  searchable: 3
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 6
  num-prec-radix: 10
- sql-name: VARBINARY
  jdbc-type-code: -3
  precision: 65535
  case-sensitive: true
  searchable: 2
  unsigned: false
  fixed-prec-scale: false
  auto-increment: false
  minimum-scale: 0
  maximum-scale: 0
  num-prec-radix: 10
