- id: urn:mill/metadata/entity:skymill.cities
  type: TABLE
  createdAt: '2025-11-05T10:00:00Z'
  updatedAt: '2025-11-05T10:00:00Z'
  facets:
    urn:mill/metadata/facet-type:source-table:
      urn:mill/metadata/scope:global:
        sourceType: JDBC
        package: ''
        name: CITIES
    urn:mill/metadata/facet-type:descriptive:
      urn:mill/metadata/scope:global:
        displayName: Cities
        description: Airport cities served by the airline. Suitable for queries about destinations, routes, passenger residence,
          or city coverage.
    urn:mill/metadata/facet-type:relation:
      urn:mill/metadata/scope:global:
        relations:
        - name: cities_segments_origin
          description: Origin city for segments
          sourceTable:
            schema: skymill
            table: cities
          sourceAttributes:
          - id
          targetTable:
            schema: skymill
            table: segments
          targetAttributes:
          - origin
          cardinality: ONE_TO_MANY
          type: FOREIGN_KEY
          joinSql: cities.id = segments.origin
        - name: cities_segments_destination
          description: Destination city for segments
          sourceTable:
            schema: skymill
            table: cities
          sourceAttributes:
          - id
          targetTable:
            schema: skymill
            table: segments
          targetAttributes:
          - destination
          cardinality: ONE_TO_MANY
          type: FOREIGN_KEY
          joinSql: cities.id = segments.destination
        - name: cities_passenger
          description: City of residence for passengers
          sourceTable:
            schema: skymill
            table: cities
          sourceAttributes:
          - id
          targetTable:
            schema: skymill
            table: passenger
          targetAttributes:
          - domicile_city_id
          cardinality: ONE_TO_MANY
          type: FOREIGN_KEY
          joinSql: cities.id = passenger.domicile_city_id
