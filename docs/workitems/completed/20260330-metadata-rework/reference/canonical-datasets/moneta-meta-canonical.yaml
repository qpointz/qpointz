      urn:mill/metadata/scope:global:
        sourceType: JDBC
        package: ''
        name: CLIENTS
    urn:mill/metadata/facet-type:descriptive:
      urn:mill/metadata/scope:global:
        displayName: Clients
        description: Contains client personal and contact information.
    urn:mill/metadata/facet-type:relation:
      urn:mill/metadata/scope:global:
        relations:
        - name: clients_accounts
          description: client accounts
          sourceTable:
            schema: moneta
            table: clients
          sourceAttributes:
          - client_id
          targetTable:
            schema: moneta
            table: accounts
          targetAttributes:
          - client_id
          cardinality: ONE_TO_MANY
          type: FOREIGN_KEY
          joinSql: clients.client_id = accounts.client_id
        - name: clients_loans
          description: Client to loans relationship
          sourceTable:
            schema: moneta
            table: clients
          sourceAttributes:
          - client_id
          targetTable:
            schema: moneta
            table: loans
          targetAttributes:
          - client_id
          cardinality: ONE_TO_MANY
          type: FOREIGN_KEY
          joinSql: clients.client_id = loans.client_id
        - name: clients_stock_portfolios
          description: Client to stock portfolios relationship
          sourceTable:
            schema: moneta
            table: clients
          sourceAttributes:
          - client_id
          targetTable:
            schema: moneta
            table: stock_portfolios
          targetAttributes:
          - client_id
          cardinality: ONE_TO_MANY
          type: FOREIGN_KEY
          joinSql: clients.client_id = stock_portfolios.client_id
