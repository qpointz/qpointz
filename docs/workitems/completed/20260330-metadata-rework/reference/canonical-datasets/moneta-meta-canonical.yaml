        isPK: false
        isFK: false
    urn:mill/metadata/facet-type:descriptive:
      urn:mill/metadata/scope:global:
        displayName: Country
        description: Country of residence.
    urn:mill/metadata/facet-type:value-mapping:
      urn:mill/metadata/scope:global:
        context: Country name
        similarity-threshold: 0.4
        sources:
        - type: SQL_QUERY
          name: country_values
          definition: "SELECT DISTINCT \"COUNTRY\" AS \"ID\", \n                \"COUNTRY\" AS \"VALUE\", \n             \
            \   \"COUNTRY\" AS \"TEXT\" \nFROM \"MONETA\".\"CLIENTS\"  WHERE \"COUNTRY\" IS NOT NULL"
          description: Discover all country values
          enabled: true
          cronExpression: 0 0 * * * *
