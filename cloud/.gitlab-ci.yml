cloud:build:
  stage: build
  extends: .gradle-job
  script:
    - echo $HOME    
    - ./gradlew --no-daemon ${GRADLE_CONTINUE_PARAM} --console plain :cloud:test :cloud:testITClasses
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - cloud/**/build/reports/tests/test/
      - cloud/**/build/reports/jacoco/test/
    reports:
      junit:
        - cloud/**/build/test-results/test/TEST-*.xml
