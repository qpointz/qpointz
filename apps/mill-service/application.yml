spring:
  config:
    activate:
      on-profile: skymill
  datasource:
    url: "jdbc:h2:mem:mill-skymill;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mill:
  data:
    sql:
      dialect: CALCITE
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    services:
      http:
        enable: true
        external-host: http
    backend:
      type: flow
      flow:
        cache:
          schema:
            enabled: true
            ttl: 2m
        sources:
          - ./config/skymill/skymill-flow.yml
  metadata:
    repository:
      type: jpa
    facet-type-registry:
      type: local
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "file:../../test/datasets/skymill/skymill-canonical.yaml"
---
spring:
  config:
    activate:
      on-profile: moneta
  datasource:
    url: "jdbc:h2:mem:mill-moneta;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mill:
  data:
    sql:
      dialect: h2
    backend:
      type: jdbc
      jdbc:
        url: "jdbc:h2:mem:test;INIT=RUNSCRIPT FROM '../../test/datasets/moneta/moneta.sql'"
        driver: "org.h2.Driver"
        username: "*"
        password: "*"
        target-schema: "MONETA"
  metadata:
    repository:
      type: jpa
    facet-type-registry:
      type: local
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "file:../../test/datasets/moneta/moneta-canonical.yaml"
---
spring:
  config:
    activate:
      on-profile: secure

  datasource:
    url: "jdbc:h2:mem:mill-security;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mill:
  security:
    enable: true
    allow-registration: true
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${MILL_DB_URL:jdbc:postgresql://localhost:5432/mill}
    driver-class-name: org.postgresql.Driver
    username: ${MILL_DB_USERNAME:postgres}
    password: ${MILL_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${MILL_DB_POOL_MAX:20}
      minimum-idle: ${MILL_DB_POOL_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

mill:
  metadata:
    repository:
      type: jpa
    facet-type-registry:
      type: local