# Skymill profile: flow backend + canonical/extras seeds (value-mapping facets in skymill-extras-seed.yaml).
# For AI + value-mapping + embeddings use `--spring.profiles.active=skymill-ai`.
# For AI + MCP HTTP use `--spring.profiles.active=skymill-ai-mcp` (see classpath `spring.profiles.group`).
spring:
  config:
    activate:
      on-profile: skymill

mill:
  data:
    sql:
      dialect: CALCITE
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    backend:
      type: flow
      flow:
        cache:
          schema:
            enabled: true
            ttl: 2m
        sources:
          - ./config/skymill/skymill-flow.yml
  metadata:
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
        - "classpath:metadata/platform-dq-l1-facet-types.yaml"
        - "classpath:metadata/platform-dq-l2-facet-types.yaml"
        - "file:../../test/datasets/skymill/skymill-canonical.yaml"
        - "file:../../test/datasets/skymill/skymill-extras-seed.yaml"

---
spring:
  config:
    activate:
      on-profile: moneta
mill:
  data:
    sql:
      dialect: h2
    backend:
      type: jdbc
      jdbc:
        url: "jdbc:h2:mem:test;INIT=RUNSCRIPT FROM '../../test/datasets/moneta/moneta.sql'"
        driver: "org.h2.Driver"
        username: "*"
        password: "*"
        target-schema: "MONETA"
  metadata:
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "file:../../test/datasets/moneta/moneta-canonical.yaml"
        - "file:../../test/datasets/moneta/moneta-extras-seed.yaml"
---
spring:
  config:
    activate:
      on-profile: secure
mill:
  security:
    enable: true
    allow-registration: true
    authentication:
      basic:
        enable: true
        store: jpa
---
spring:
  config:
    activate:
      on-profile: secure-file
mill:
  security:
    enable: true
    allow-registration: false
    authentication:
      basic:
        enable: true
        store: ${MILL_AUTH_STORE:file:config/auth.yml}
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${MILL_DB_URL:jdbc:postgresql://localhost:5432/mill}
    driver-class-name: org.postgresql.Driver
    username: ${MILL_DB_USERNAME:postgres}
    password: ${MILL_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${MILL_DB_POOL_MAX:20}
      minimum-idle: ${MILL_DB_POOL_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
---
# AI v3 chat HTTP/SSE (`mill-ai-service`). Use with Gradle edition `ai` (classpath) and
# `--spring.profiles.active=ai` so `mill.ai.*` binds. Set `OPENAI_API_KEY` (or override in env-specific config).
spring:
  config:
    activate:
      on-profile: ai

logging:
  level:
    io.qpointz.mill.ai.capabilities.valuemapping: DEBUG

mill:
  ai:
    # Overrides default `mill.ai.enabled: false` from classpath application.yml when profile `ai` is active.
    enabled: true
    providers:
      openai:
        type: openai
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    models:
      chat:
        default:
          provider: openai
          model-name: ${OPENAI_MODEL:gpt-4o-mini}
      embedding:
        default:
          provider: openai
          model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          dimension: ${OPENAI_EMBEDDING_DIMENSION:1536}
    data:
      embedding:
        default:
          model: default
          vector-store:
            backend: in-memory
          max-content-length: 2048
          refresh:
            on-startup:
              enabled: true
            schedule:
              enabled: true
              interval: PT15M
          sources:
            - type: metadata-facets
    chat:
      model: default
      default-profile: hello-world
      default-user-id: default
      max-title-length: 30
      value-mapping:
        embedding: default
---
# Local ChromaDB vector store (no auth). Use with AI, e.g. `--spring.profiles.active=ai,chromadb`
# and a Chroma server on localhost:8000 (see deploy/local-dev/docker-compose `chromadb`).
spring:
  config:
    activate:
      on-profile: chromadb

mill:
  ai:
    data:
      embedding:
        default:
          vector-store:
            backend: chroma
            chroma:
              base-url: http://localhost:8000
---
# LangChain4j pgvector on the primary Spring DataSource. Requires PostgreSQL with CREATE EXTENSION vector.
# Use with a JDBC URL to Postgres (not the default H2 dev datasource), e.g. `--spring.profiles.active=ai,pgvector` or `ai-pgvector` (see classpath application.yml for `spring.profiles.group`).
spring:
  config:
    activate:
      on-profile: pgvector

mill:
  ai:
    chat:
      default-profile: schema-authoring
    data:
      embedding:
        default:
          vector-store:
            backend: pgvector
            pgvector:
              table: ai_value_mapping_vector
              create-table: true
---
# OAuth/OIDC login via Authentik (local dev).
# Discovery document:
#   http://localhost:19000/application/o/dev-app/.well-known/openid-configuration
spring:
  config:
    activate:
      on-profile: oauth
  security:
    oauth2:
      client:
        provider:
          authentik:
            # The issuer is the base URL whose `.well-known/openid-configuration` is used for discovery.
            issuer-uri: http://localhost:19000/application/o/dev-app/
            # Use discovery `userinfo_endpoint` (typically `/application/o/userinfo/`). Do not set
            # `/application/o/<app-slug>/userinfo/` — Authentik 2026.2 responds 404 for that path.
        registration:
          authentik:
            provider: authentik
            client-name: Authentik
            # Defaults match `deploy/local-dev/authentik` blueprints (see `docs/design/platform/local-dev-authentik.md`).
            client-id: ${AUTHENTIK_CLIENT_ID:dev-client}
            client-secret: ${AUTHENTIK_CLIENT_SECRET:dev-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email

mill:
  security:
    enable: true
    # After OIDC callback on :8080, redirect the browser to the Vite dev server when no saved request exists.
    oauth2:
      login:
        default-success-url: http://localhost:5173/app/
        # Ignore SavedRequest so OAuth never redirects to stray paths (e.g. favicon) on :8080.
        always-use-default-success-url: true
    authentication:
      oauth2-resource-server:
        enable: true
        jwt:
          # Derived from issuer; keeps Mill JWT validation aligned with Authentik for local dev.
          jwk-set-uri: http://localhost:19000/application/o/dev-app/jwks/
      # Ensure no other auth method is implicitly enabled by environment-specific config.
      basic:
        enable: false
      entra-id-token:
        enable: false

# Spring Boot logging (this document is active only with profile `oauth`).
# Narrower than `org.springframework.security=DEBUG`, which floods the console.
# Override per-logger at runtime, e.g. LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY_OAUTH2=TRACE
logging:
  level:
    org.springframework.security.oauth2: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG
---
# MCP Streamable HTTP servlet at `/services/mcp` (`mill-ai-mcp-transport-http`).
# Requires AI on the classpath and profile `ai` — use group `ai-mcp` or `skymill-ai-mcp` (classpath application.yml).
# With `mill.security.enable=true`, clients authenticate like other `/services/**` routes (Bearer or Basic).
spring:
  config:
    activate:
      on-profile: mcp

mill:
  ai:
    mcp:
      enabled: true
      profile: ${MILL_MCP_PROFILE:data-analysis}
      http:
        endpoint: ${MILL_MCP_HTTP_ENDPOINT:/services/mcp}
