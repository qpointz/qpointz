# Skymill profile: flow backend + canonical/extras seeds (value-mapping facets in skymill-extras-seed.yaml).
# For AI + value-mapping + embeddings together use `--spring.profiles.active=skymill-ai` (see classpath application.yml `spring.profiles.group`).
spring:
  config:
    activate:
      on-profile: skymill

mill:
  data:
    sql:
      dialect: CALCITE
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    backend:
      type: flow
      flow:
        cache:
          schema:
            enabled: true
            ttl: 2m
        sources:
          - ./config/skymill/skymill-flow.yml
  metadata:
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
        - "file:../../test/datasets/skymill/skymill-canonical.yaml"
        - "file:../../test/datasets/skymill/skymill-extras-seed.yaml"
---
spring:
  config:
    activate:
      on-profile: moneta
mill:
  data:
    sql:
      dialect: h2
    backend:
      type: jdbc
      jdbc:
        url: "jdbc:h2:mem:test;INIT=RUNSCRIPT FROM '../../test/datasets/moneta/moneta.sql'"
        driver: "org.h2.Driver"
        username: "*"
        password: "*"
        target-schema: "MONETA"
  metadata:
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "file:../../test/datasets/moneta/moneta-canonical.yaml"
        - "file:../../test/datasets/moneta/moneta-extras-seed.yaml"
---
spring:
  config:
    activate:
      on-profile: secure
mill:
  security:
    enable: true
    allow-registration: true
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${MILL_DB_URL:jdbc:postgresql://localhost:5432/mill}
    driver-class-name: org.postgresql.Driver
    username: ${MILL_DB_USERNAME:postgres}
    password: ${MILL_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${MILL_DB_POOL_MAX:20}
      minimum-idle: ${MILL_DB_POOL_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
---
# AI v3 chat HTTP/SSE (`mill-ai-v3-service`). Use with Gradle edition `ai` (classpath) and
# `--spring.profiles.active=ai` so `mill.ai.*` binds. Set `OPENAI_API_KEY` (or override in env-specific config).
spring:
  config:
    activate:
      on-profile: ai

logging:
  level:
    io.qpointz.mill.ai.capabilities.valuemapping: DEBUG

mill:
  ai:
    # Overrides default `mill.ai.enabled: false` from classpath application.yml when profile `ai` is active.
    enabled: true
    # Shared credentials for embedding profiles that use provider `openai` (see EmbeddingAutoConfiguration).
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    # Named embedding profiles; value-mapping picks one via `value-mapping.embedding-model`.
    embedding-model:
      default:
        provider: openai
        model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
        dimension: ${OPENAI_EMBEDDING_DIMENSION:1536}
    value-mapping:
      embedding-model: default
      max-content-length: 2048
      refresh:
        on-startup:
          enabled: true
        schedule:
          enabled: true
          interval: PT15M
    # Vector store: default in-memory; use `chromadb` / `ai-chromadb` for local Chroma, or `pgvector` / `ai-pgvector` for LangChain4j on Postgres (see `---` at file end).
    model:
      provider: openai
      api-key: ${OPENAI_API_KEY:}
      model-name: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: ${OPENAI_BASE_URL:}
    chat:
      default-profile: hello-world
      default-user-id: default
      max-title-length: 30
---
# Local ChromaDB vector store (no auth). Use with AI, e.g. `--spring.profiles.active=ai,chromadb`
# and a Chroma server on localhost:8000 (see deploy/local-dev/docker-compose `chromadb`).
spring:
  config:
    activate:
      on-profile: chromadb

mill:
  ai:
    vector-store:
      backend: chroma
      chroma:
        base-url: http://localhost:8000
---
# LangChain4j pgvector on the primary Spring DataSource. Requires PostgreSQL with CREATE EXTENSION vector.
# Use with a JDBC URL to Postgres (not the default H2 dev datasource), e.g. `--spring.profiles.active=ai,pgvector` or `ai-pgvector` (see classpath application.yml for `spring.profiles.group`).
spring:
  config:
    activate:
      on-profile: pgvector

mill:
  ai:
    vector-store:
      backend: pgvector
      pgvector:
        table: mill_langchain_embedding_store
        create-table: true