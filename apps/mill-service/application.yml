spring:
  config:
    activate:
      on-profile: skymill

mill:
  data:
    sql:
      dialect: calcite
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    services:
      http:
        enable: true
        external-host: http
    backend:
      type: flow
      flow:
        sources:
          - ./config/skymill/skymill-flow.yml
---
spring:
  config:
    activate:
      on-profile: moneta

mill:
  data:
    sql:
      dialect: h2
    backend:
      type: jdbc
      jdbc:
        url: "jdbc:h2:mem:test;INIT=RUNSCRIPT FROM '../../test/datasets/moneta/moneta.sql'"
        driver: "org.h2.Driver"
        username: "*"
        password: "*"
        target-schema: "MONETA"
---
spring:
  config:
    activate:
      on-profile: secure

  datasource:
    url: "jdbc:h2:mem:mill-security;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

mill:
  security:
    enable: true
    allow-registration: true