grpc:
  server:
    port: ${mill.data.services.grpc.port}
#    address: ${mill.data.services.grpc.address}


spring:
  application:
    name: ${mill.application.name}
  main:
    web-application-type: servlet
  datasource:
    url: "jdbc:h2:mem:mill-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # V9 (pgvector Java migration) was inserted after V10+; allow applying it on existing databases.
    out-of-order: true

server:
  forward-headers-strategy: framework

logging:
  file:
    name: logs/mill-service.log
    # Console-only: set enabled false and/or clear name (e.g. Cloud Run without profile gcp).
    enabled: true
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  # Local default: colored console (Logback ANSI; not Jansi — works in IDEA). Plain: QP_LOGGING_PLAIN=true.

mill:
  application:
    name: mill-service
    hosts:
      externals:
        http:
          scheme: http
          host: localhost
          port: 8080
        grpc:
          scheme: grpc
          host: localhost
          port: 9090
        http-request:
          scheme: "@request.scheme"
          host: "@request.host"
          port: "@request.port"
        grpc-request:
          scheme: grpc
          host: "@request.host"
          port: 9090
  data:
    sql:
      dialect: calcite
    # Core query-result session engine (`mill-data-query`): lazy fetch from dispatcher, page-window cache
    # (`max-cached-pages`), per-scan cap (`max-materialized-rows`), Caffeine, defaults.
    # Binds as `mill.data.query.*` when the module is wired — see `docs/design/platform/query-result-execution-service.md`.
    query:
      default-fetch-size: 2048
      enabled: true
      max-cached-pages: 16
      session-expire-after-access: PT10M
    services:
      grpc:
        external-host: grpc-request
        port: 9090
        enable: true
      http:
        enable: true
        external-host: http-request
      export:
        enable: true
        external-host: http-request
      # Paged query-result HTTP API (`/api/v1/query/**`, `mill-data-query-service`). Same enable / external-host pattern as `http` and `export`.
      query:
        enable: true
        external-host: http-request
      odata:
        enable: true
        external-host: http-request
        cache:
          edm:
            enabled: true
            ttl: 2m
  ## LEGACY subject to review
  security:
    enable: false
  metadata:
    repository:
      type: jpa
    facet-type-registry:
      type: local
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
  ai:
    # Opt-in: enable AI v3 via `--spring.profiles.active=ai` (see second document), which sets enabled: true.
    enabled: false
  ui:
    version: v2
    enabled: true

springdoc:
  swagger-ui:
    tags-sorter: alpha

# Actuator: health + `/actuator/valuemap` (value-mapping wiring snapshot). Append `,beans` for full `/actuator/beans` (large/sensitive — avoid in production).
management:
  endpoints:
    web:
      exposure:
        include: health,valuemap,beans

---
# AI v3 chat HTTP/SSE (`mill-ai-service`). Build with Gradle edition `ai`.
# Value-mapping refresh needs Skymill extras seed: use `--spring.profiles.active=skymill-ai` (or `skymill,ai`).
# Set `OPENAI_API_KEY` (used for chat and embedding provider `openai`).
spring:
  config:
    activate:
      on-profile: ai

mill:
  ai:
    enabled: true
    providers:
      openai:
        type: openai
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    models:
      chat:
        default:
          provider: openai
          model-name: ${OPENAI_MODEL:gpt-4o-mini}
      embedding:
        default:
          provider: openai
          model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
          dimension: 1536
    data:
      embedding:
        default:
          model: default
          vector-store:
            backend: in-memory
          max-content-length: 2048
          refresh:
            on-startup:
              enabled: true
            schedule:
              enabled: true
              interval: PT15M
          sources:
            - type: metadata-facets
    chat:
      model: default
      default-profile: hello-world
      default-user-id: default
      max-title-length: 30
      value-mapping:
        embedding: default
---
# MCP Streamable HTTP at `/services/mcp`. Use with `ai` (groups `ai-mcp`, `skymill-ai-mcp`).
spring:
  config:
    activate:
      on-profile: mcp

mill:
  ai:
    mcp:
      enabled: true
      profile: ${MILL_MCP_PROFILE:schema-exploration}
      http:
        endpoint: ${MILL_MCP_HTTP_ENDPOINT:/services/mcp}
---
# Local ChromaDB (localhost:8000, no auth). Activate with `ai,chromadb` or `spring.profiles.active=ai-chromadb`.
spring:
  config:
    activate:
      on-profile: chromadb

mill:
  ai:
    data:
      embedding:
        default:
          vector-store:
            backend: chroma
            chroma:
              base-url: http://localhost:8000
---
# LangChain4j pgvector on the primary Spring DataSource. Requires PostgreSQL with CREATE EXTENSION vector.
# Flyway V9 (WI-322) attempts CREATE EXTENSION on PostgreSQL when pgvector packages are installed.
# Use with a JDBC URL to Postgres (not the default H2 dev datasource), e.g. `--spring.profiles.active=ai,pgvector` or `ai-pgvector`.
spring:
  config:
    activate:
      on-profile: pgvector

mill:
  ai:
    data:
      embedding:
        default:
          vector-store:
            backend: pgvector
            pgvector:
              table: ai_value_mapping_vector
              create-table: true
---
# JPA-backed basic auth with registration. Requires a JDBC datasource (e.g. postgres profile).
spring:
  config:
    activate:
      on-profile: secure
mill:
  security:
    enable: true
    allow-registration: true
    authentication:
      basic:
        enable: true
        store: jpa
---
# Minimal security: file-backed basic auth. Mount or copy auth.yml outside the JAR (see MILL_AUTH_STORE).
spring:
  config:
    activate:
      on-profile: secure-minimal
mill:
  security:
    enable: true
    allow-registration: false
    authentication:
      basic:
        enable: true
        store: ${MILL_AUTH_STORE:file:/app/etc/auth/auth.yml}
---
# Alias for local overrides in apps/mill-service/application.yml (same defaults as secure-minimal).
spring:
  config:
    activate:
      on-profile: secure-file
mill:
  security:
    enable: true
    allow-registration: false
    authentication:
      basic:
        enable: true
        store: ${MILL_AUTH_STORE:file:/app/etc/auth/auth.yml}
