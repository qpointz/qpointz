grpc:
  server:
    port: ${mill.data.services.grpc.port}
#    address: ${mill.data.services.grpc.address}


spring:
  application:
    name: ${mill.application.name}
  main:
    web-application-type: servlet
  datasource:
    url: "jdbc:h2:mem:mill-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  file:
    name: logs/mill-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

mill:
  application:
    name: mill-service
    hosts:
      externals:
        http:
          scheme: http
          host: localhost
          port: 8080
        grpc:
          scheme: grpc
          host: localhost
          port: 9090
  data:
    sql:
      dialect: calcite
    services:
      grpc:
        enable: true
        external-host: grpc
        port: 9090
      http:
        enable: true
        external-host: http
        port: 8080
## LEGACY subject to review
  security:
    enable: false
  metadata:
    repository:
      type: jpa
    facet-type-registry:
      type: local
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
  services:
    ai-nl2data:
      enable: false

springdoc:
  swagger-ui:
    tags-sorter: alpha

---
# AI v3 chat HTTP/SSE (`mill-ai-v3-service`). Build with Gradle edition `ai`; run with
# `--spring.profiles.active=ai` so `mill.ai.*` binds. Set `OPENAI_API_KEY`.
spring:
  config:
    activate:
      on-profile: ai

mill:
  ai:
    model:
      provider: openai
      api-key: ${OPENAI_API_KEY:}
      model-name: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: ${OPENAI_BASE_URL:}
    chat:
      default-profile: hello-world
      default-user-id: default
      max-title-length: 30
