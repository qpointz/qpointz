grpc:
  server:
    port: ${mill.data.services.grpc.port}
#    address: ${mill.data.services.grpc.address}


spring:
  application:
    name: ${mill.application.name}
  # Activate e.g. `--spring.profiles.active=skymill-ai` to load Skymill flow + extras seed and AI/embedding/value-mapping.
  profiles:
    group:
      skymill-ai:
        - skymill
        - ai
      moneta-ai:
        - moneta
        - ai
      ai-chromadb:
        - ai
        - chromadb
      ai-pgvector:
        - ai
        - pgvector
  main:
    web-application-type: servlet
  datasource:
    url: "jdbc:h2:mem:mill-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  file:
    name: logs/mill-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

mill:
  application:
    name: mill-service
    hosts:
      externals:
        http:
          scheme: http
          host: localhost
          port: 8080
        grpc:
          scheme: grpc
          host: localhost
          port: 9090
  data:
    sql:
      dialect: calcite
    services:
      grpc:
        enable: true
        external-host: grpc
        port: 9090
      http:
        enable: true
        external-host: http
        port: 8080
## LEGACY subject to review
  security:
    enable: false
  metadata:
    repository:
      type: jpa
    facet-type-registry:
      type: local
    seed:
      resources:
        - "classpath:metadata/platform-bootstrap.yaml"
        - "classpath:metadata/platform-flow-facet-types.yaml"
  services:
    ai-nl2data:
      enable: false
  ai:
    # Opt-in: enable AI v3 via `--spring.profiles.active=ai` (see second document), which sets enabled: true.
    enabled: false

springdoc:
  swagger-ui:
    tags-sorter: alpha

# Actuator: health + `/actuator/valuemap` (value-mapping wiring snapshot). Append `,beans` for full `/actuator/beans` (large/sensitive — avoid in production).
management:
  endpoints:
    web:
      exposure:
        include: health,valuemap,beans

---
# AI v3 chat HTTP/SSE (`mill-ai-v3-service`). Build with Gradle edition `ai`.
# Value-mapping refresh needs Skymill extras seed: use `--spring.profiles.active=skymill-ai` (or `skymill,ai`).
# Set `OPENAI_API_KEY` (used for chat and embedding provider `openai`).
spring:
  config:
    activate:
      on-profile: ai

mill:
  ai:
    enabled: true
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    embedding-model:
      default:
        provider: openai
        model-name: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
        dimension: 1536
    value-mapping:
      embedding-model: default
      max-content-length: 2048
      refresh:
        on-startup:
          enabled: true
        schedule:
          enabled: true
          interval: PT15M
    # Vector store: default in-memory; use `chromadb` / `ai-chromadb` for local Chroma, or `pgvector` / `ai-pgvector` for LangChain4j on Postgres (see `---` at file end).
    model:
      provider: openai
      api-key: ${OPENAI_API_KEY:}
      model-name: ${OPENAI_MODEL:gpt-4o-mini}
      base-url: ${OPENAI_BASE_URL:}
    chat:
      default-profile: hello-world
      default-user-id: default
      max-title-length: 30
---
# Local ChromaDB (localhost:8000, no auth). Activate with `ai,chromadb` or `spring.profiles.active=ai-chromadb`.
spring:
  config:
    activate:
      on-profile: chromadb

mill:
  ai:
    vector-store:
      backend: chroma
      chroma:
        base-url: http://localhost:8000
---
# LangChain4j pgvector on the primary Spring DataSource. Requires PostgreSQL with CREATE EXTENSION vector.
# Use with a JDBC URL to Postgres (not the default H2 dev datasource), e.g. `--spring.profiles.active=ai,pgvector` or `ai-pgvector`.
spring:
  config:
    activate:
      on-profile: pgvector

mill:
  ai:
    vector-store:
      backend: pgvector
      pgvector:
        table: mill_langchain_embedding_store
        create-table: true
