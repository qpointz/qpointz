spring:
  profiles:
    active: skymill
---
spring:
  config:
    activate:
      on-profile: skymill

mill:
  data:
    sql:
      dialect: calcite
      conventions:
        quoting: BACK_TICK
        caseSensitive: "false"
        unquotedCasing: UNCHANGED
    backend:
      type: flow
      flow:
        cache:
          schema:
            enabled: true
            ttl: 1m
        sources:
          - ./config/skymill-flow.yml
---
# Integration edition + secure-file: explicit auth for CI Docker (WORKDIR=/app; auth at ./etc/auth/auth.yml).
# Without mill.security.enable here, default is false and basic-auth jobs can false-pass (credentials sent but ignored).
# Local launch from bin/: export MILL_AUTH_STORE=file:../etc/auth/auth.yml
spring:
  config:
    activate:
      on-profile: secure-file
mill:
  security:
    enable: true
    allow-registration: false
    authentication:
      basic:
        enable: true
        store: ${MILL_AUTH_STORE:file:./etc/auth/auth.yml}
---
spring:
  config:
    activate:
      on-profile: moneta

mill:
  data:
    sql:
      dialect: h2
    backend:
      type: jdbc
      jdbc:
        url: "jdbc:h2:mem:test;INIT=RUNSCRIPT FROM './etc/data/moneta/moneta.sql'"
        driver: "org.h2.Driver"
        username: "*"
        password: "*"
        target-schema: "MONETA"