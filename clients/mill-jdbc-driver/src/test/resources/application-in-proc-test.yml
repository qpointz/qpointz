logging:
  level:
    root: debug

mill:
  data:
    sql:
      dialect: calcite
      conventions:
        quoting: BACK_TICK
        caseSensitive: true
        unquotedCasing: UNCHANGED
    backend:
      type: calcite
      calcite:
        model: ./etc/config/test/model.yaml
    services:
      grpc:
        enable: true
        in-process-name: jdbc-test-service
  security:
    enable: false
  services:
    grpc:
      enable: true
